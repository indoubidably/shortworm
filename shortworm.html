// ── Constellation init / spawn ─────────────────────────────────────────────
function initConstellations() {
  bgScrollX = 0;
  bgScrollStars = [];
  constellations = [];
  cnstCreatures = [];
  cnstSpawnTimer = Math.floor(rand(CNST_SPAWN_MIN, CNST_SPAWN_MAX));
  cnstRetired = new Set();
  cnstScoreMult = 1; cnstScoreMultT = 0;
  cnstPoisonSafe = false; cnstPoisonSafeT = 0;
  cnstRainbowT = 0;

  // 200 parallax background stars (3 depth layers)
  for (let i = 0; i < 200; i++) {
    const layer = Math.floor(Math.random() * 3); // 0 slow, 1 mid, 2 fast
    bgScrollStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: layer === 2 ? rand(1.2, 2.0) : layer === 1 ? rand(0.7, 1.3) : rand(0.3, 0.7),
      alpha: rand(0.4, 1.0),
      layer,
      speed: [0.2, 0.4, 0.7][layer],
    });
  }

  // Pre-place 4 constellations spaced across and just off-screen right
  const ids = Object.keys(CNST_DEFS);
  const picks = [];
  while (picks.length < 4) {
    const id = ids[Math.floor(Math.random() * ids.length)];
    if (!picks.includes(id)) picks.push(id);
  }
  for (let i = 0; i < 4; i++) {
    _spawnCnst(W + 200 + i * 380, picks[i]);
  }
}

function _pickCnstId() {
  const ids = Object.keys(CNST_DEFS);
  // weighted: harmful×7, beneficial×2, wildcard×1
  const pool = [];
  for (const id of ids) {
    const def = CNST_DEFS[id];
    const w = def.type === 'harmful' ? 7 : def.type === 'beneficial' ? 2 : 1;
    for (let i = 0; i < w; i++) pool.push(id);
  }
  // Avoid recently retired (last 3)
  const eligible = pool.filter(id => !cnstRetired.has(id));
  const src = eligible.length > 0 ? eligible : pool;
  return src[Math.floor(Math.random() * src.length)];
}

function _spawnCnst(screenX, forceId) {
  const id = forceId || _pickCnstId();
  const def = CNST_DEFS[id];
  const screenY = rand(H * 0.2, H * 0.8);
  constellations.push({
    id,
    def,
    screenX,
    screenY,
    state: 'dormant',   // dormant → waking → active → sleeping
    wakeTimer: 0,
    activeTimer: 0,
    sleepTimer: 0,
    lineProgress: 0,
    heartPulse: 0,
    heartTouched: false,
    creaturesReleased: false,
    opacity: 0.18,      // dormant baseline
  });
}

// ── Main update ───────────────────────────────────────────────────────────────
function updateConstellations() {
  if (!gameStarted || levelPaused) return;

  // Scroll stars
  bgScrollX += L3_SCROLL;
  for (const s of bgScrollStars) {
    s.x -= s.speed;
    if (s.x < -4) s.x += W + 4;
  }

  // Spawn timer
  cnstSpawnTimer--;
  if (cnstSpawnTimer <= 0) {
    cnstSpawnTimer = Math.floor(rand(CNST_SPAWN_MIN, CNST_SPAWN_MAX));
    _spawnCnst(W + 180);
  }

  // Effect timers
  if (cnstScoreMultT > 0) { cnstScoreMultT--; if (cnstScoreMultT === 0) cnstScoreMult = 1; }
  if (cnstPoisonSafeT > 0) { cnstPoisonSafeT--; if (cnstPoisonSafeT === 0) cnstPoisonSafe = false; }
  if (cnstRainbowT > 0) cnstRainbowT--;

  const hx = wSegs.length > 0 ? wrapX(wSegs[0].x) : -9999;
  const hy = wSegs.length > 0 ? wrapY(wSegs[0].y) : -9999;

  // Count active harmful/beneficial for cap enforcement
  let activeH = 0, activeB = 0;
  for (const c of constellations) {
    if (c.state === 'active') {
      if (c.def.type === 'harmful') activeH++;
      else if (c.def.type === 'beneficial') activeB++;
    }
  }

  for (let i = constellations.length - 1; i >= 0; i--) {
    const c = constellations[i];

    // Scroll all constellations left
    c.screenX -= L3_SCROLL;

    // Remove when far off-screen left
    if (c.screenX < -350) {
      _cnstFadeCreatures(c.id);
      constellations.splice(i, 1);
      // Add to retired ring buffer (keep last 3)
      cnstRetired.add(c.id);
      if (cnstRetired.size > 3) {
        const oldest = cnstRetired.values().next().value;
        cnstRetired.delete(oldest);
      }
      continue;
    }

    c.heartPulse += 0.06;
    _updateCnstState(c, hx, hy, activeH, activeB);
  }

  // Update creatures
  for (let i = cnstCreatures.length - 1; i >= 0; i--) {
    const cr = cnstCreatures[i];
    if (cr.state === 'dead') { cnstCreatures.splice(i, 1); continue; }

    // Scroll creature with background
    cr.x -= L3_SCROLL;
    if (cr.x < -80) { cr.state = 'dead'; continue; }

    if (cr.state === 'fading') {
      cr.fadeAlpha -= 0.04;
      if (cr.fadeAlpha <= 0) { cr.state = 'dead'; continue; }
    } else {
      _moveCnstCreature(cr, hx, hy);
      _checkCnstCreatureCollision(cr, hx, hy);
    }
  }
}

function _updateCnstState(c, hx, hy, activeH, activeB) {
  const cx = c.screenX, cy = c.screenY;
  const dist = Math.hypot(hx - cx, hy - cy);

  // Heart star touch check
  if (!c.heartTouched && dist < CNST_HEART_R && c.state !== 'sleeping') {
    _onHeartTouch(c);
    return;
  }

  if (c.state === 'dormant') {
    c.opacity = 0.18;
    if (dist < CNST_PROX) {
      // Check cap before allowing wake
      const wouldExceed = (c.def.type === 'harmful' && activeH >= MAX_HARM_ACTIVE) ||
                          (c.def.type === 'beneficial' && activeB >= MAX_BENE_ACTIVE);
      if (!wouldExceed) {
        c.state = 'waking';
        c.wakeTimer = 0;
        c.lineProgress = 0;
      }
    }

  } else if (c.state === 'waking') {
    c.wakeTimer++;
    c.lineProgress = Math.min(1, c.wakeTimer / CNST_WAKE_T);
    c.opacity = 0.18 + 0.62 * c.lineProgress;

    if (c.wakeTimer >= CNST_ACTIVE_T) {
      c.state = 'active';
      c.activeTimer = 0;
      if (!c.creaturesReleased) {
        _releaseCreatures(c);
        c.creaturesReleased = true;
      }
      if (c.def.type === 'beneficial') _activateBenefit(c);
    }

  } else if (c.state === 'active') {
    c.opacity = 0.80;
    c.activeTimer++;
    if (c.activeTimer >= CNST_CYCLE_F) {
      c.state = 'sleeping';
      c.sleepTimer = 0;
      _cnstFadeCreatures(c.id);
    }

  } else if (c.state === 'sleeping') {
    c.sleepTimer++;
    c.opacity = Math.max(0.05, 0.80 * (1 - c.sleepTimer / CNST_SLEEP_F));
    if (c.sleepTimer >= CNST_SLEEP_F) {
      c.state = 'dormant';
      c.wakeTimer = 0;
      c.creaturesReleased = false;
      c.heartTouched = false;
    }
  }
}

function _onHeartTouch(c) {
  c.heartTouched = true;
  if (c.def.type === 'harmful') {
    // Neutralise: send to sleep immediately
    c.state = 'sleeping';
    c.sleepTimer = 0;
    _cnstFadeCreatures(c.id);
    showToast('CONSTELLATION NEUTRALISED!', 1800, '#00e5ff');
    sfx.snap && sfx.snap();
  } else if (c.def.type === 'beneficial') {
    // Accelerate activation
    c.state = 'active';
    c.activeTimer = 0;
    if (!c.creaturesReleased) {
      _releaseCreatures(c);
      c.creaturesReleased = true;
    }
    _activateBenefit(c);
    showToast('CONSTELLATION ACTIVATED!', 1800, '#f5e642');
  } else {
    // Wildcard: coin-flip
    if (Math.random() < 0.5) {
      c.state = 'sleeping'; c.sleepTimer = 0; _cnstFadeCreatures(c.id);
      showToast('WILDCARD: SAFE!', 1800, '#00e5ff');
    } else {
      c.state = 'active'; c.activeTimer = 0;
      if (!c.creaturesReleased) { _releaseCreatures(c); c.creaturesReleased = true; }
      showToast('WILDCARD: DANGER!', 1800, '#ff2d78');
    }
  }
}

function _activateBenefit(c) {
  switch (c.id) {
    case 'lyra':
      // +300 score burst
      score += 300; updateHUD();
      showToast('LYRA: +300 BONUS!', 2000, '#f5e642');
      break;
    case 'corona':
      // 2× score multiplier for 10 seconds
      cnstScoreMult = 2;
      cnstScoreMultT = 600;
      showToast('CORONA BOREALIS: 2× SCORE!', 2200, '#f5e642');
      break;
    case 'cygnus':
      // Restore 1 life (capped at 3)
      if (lives < 3) { lives++; updateHUD(); }
      showToast('CYGNUS: LIFE RESTORED!', 2200, '#00e5ff');
      break;
    case 'papilio':
      // Poison immunity for 8 seconds
      cnstPoisonSafe = true;
      cnstPoisonSafeT = 480;
      showToast('PAPILIO: POISON IMMUNE!', 2200, '#aaff00');
      break;
    case 'auriga':
      // Rainbow burst: double-score next 20 pixels (reuse cnstScoreMult briefly)
      cnstRainbowT = 400;
      cnstScoreMult = Math.max(cnstScoreMult, 1.5);
      cnstScoreMultT = Math.max(cnstScoreMultT, 400);
      showToast('AURIGA: RAINBOW BOOST!', 2200, '#f5e642');
      break;
  }
}

function _releaseCreatures(c) {
  const def = c.def;
  const count = Math.floor(rand(def.count[0], def.count[1] + 1));
  _spawnCnstCreatures(c, def.creature, count, c.screenX, c.screenY);
}

function _spawnCnstCreatures(c, type, count, ox, oy) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spread = rand(30, 80);
    cnstCreatures.push({
      cnstId: c.id,
      type,
      x: ox + Math.cos(angle) * spread,
      y: oy + Math.sin(angle) * spread,
      vx: 0, vy: 0,
      angle: Math.random() * Math.PI * 2,
      phase: Math.random() * Math.PI * 2,
      t: 0,
      state: 'active',
      fadeAlpha: 1,
      r: 7,
    });
  }
}

function _cnstFadeCreatures(cnstId) {
  for (const cr of cnstCreatures) {
    if (cr.cnstId === cnstId && cr.state === 'active') {
      cr.state = 'fading';
      cr.fadeAlpha = 1;
    }
  }
}

function _moveCnstCreature(cr, hx, hy) {
  cr.t++;
  const dx = hx - cr.x, dy = hy - cr.y;
  const dist = Math.hypot(dx, dy) || 1;

  switch (cr.type) {
    case 'meteor': {
      // Diagonal streaks, slight home-seeking at close range
      const spd = 2.5;
      cr.vx += Math.cos(cr.angle) * 0.1;
      cr.vy += Math.sin(cr.angle) * 0.1 + 0.02;
      if (dist < 200) { cr.vx += (dx / dist) * 0.15; cr.vy += (dy / dist) * 0.15; }
      const v = Math.hypot(cr.vx, cr.vy);
      if (v > spd) { cr.vx = cr.vx / v * spd; cr.vy = cr.vy / v * spd; }
      break; }
    case 'spike': {
      // Orbit then dart
      const orbitR = 120 + 30 * Math.sin(cr.t * 0.02);
      const orbitA = cr.phase + cr.t * 0.025;
      const tx = hx + Math.cos(orbitA) * orbitR;
      const ty = hy + Math.sin(orbitA) * orbitR;
      const ex = tx - cr.x, ey = ty - cr.y;
      cr.vx += ex * 0.06; cr.vy += ey * 0.06;
      const v2 = Math.hypot(cr.vx, cr.vy);
      if (v2 > 3) { cr.vx = cr.vx / v2 * 3; cr.vy = cr.vy / v2 * 3; }
      break; }
    case 'bolt': {
      // Fast straight line toward worm then bounce off walls
      if (cr.t % 120 === 0) { cr.angle = Math.atan2(dy, dx); }
      cr.vx = Math.cos(cr.angle) * 3.5;
      cr.vy = Math.sin(cr.angle) * 3.5;
      if (cr.x < 0 || cr.x > W) cr.vx *= -1;
      if (cr.y < 0 || cr.y > H) cr.vy *= -1;
      break; }
    case 'snake': {
      // Sinusoidal patrol then lunge
      cr.angle += 0.03;
      const base = Math.atan2(dy, dx);
      const wobble = Math.sin(cr.t * 0.05) * 1.2;
      cr.vx = Math.cos(base + wobble) * 2;
      cr.vy = Math.sin(base + wobble) * 2;
      break; }
    case 'wriggler': {
      // S-curve approach
      const ta = Math.atan2(dy, dx);
      const s = Math.sin(cr.t * 0.08) * 0.9;
      cr.vx += (Math.cos(ta + s) * 1.8 - cr.vx) * 0.12;
      cr.vy += (Math.sin(ta + s) * 1.8 - cr.vy) * 0.12;
      break; }
    case 'pulsar': {
      // Pulsating expand-contract, then snap toward worm
      const pR = 90 + 50 * Math.sin(cr.t * 0.04);
      const pA = cr.phase + cr.t * 0.02;
      cr.x = hx + Math.cos(pA) * pR;
      cr.y = hy + Math.sin(pA) * pR;
      cr.vx = 0; cr.vy = 0;
      return; } // direct position set
    case 'hornet': {
      // Aggressive homing with speed bursts
      const spd2 = dist < 150 ? 4 : 2.2;
      cr.vx += (dx / dist) * 0.3; cr.vy += (dy / dist) * 0.3;
      const v3 = Math.hypot(cr.vx, cr.vy);
      if (v3 > spd2) { cr.vx = cr.vx / v3 * spd2; cr.vy = cr.vy / v3 * spd2; }
      break; }
    case 'chaser': {
      // Pure homing
      cr.vx += (dx / dist) * 0.25; cr.vy += (dy / dist) * 0.25;
      const v4 = Math.hypot(cr.vx, cr.vy);
      if (v4 > 3) { cr.vx = cr.vx / v4 * 3; cr.vy = cr.vy / v4 * 3; }
      break; }
    case 'twin': {
      // Mirror-pair patrol lines
      cr.vx = Math.cos(cr.phase + cr.t * 0.015) * 2;
      cr.vy = Math.sin(cr.t * 0.03) * 1.5;
      break; }
    case 'rusher': {
      // Long windup then fast rush
      const rush = cr.t % 180;
      if (rush < 120) {
        // Windup: slow circle
        cr.vx = Math.cos(cr.phase + rush * 0.05) * 1;
        cr.vy = Math.sin(cr.phase + rush * 0.05) * 1;
      } else {
        // Rush
        cr.vx = (dx / dist) * 5; cr.vy = (dy / dist) * 5;
      }
      break; }
    // Beneficial creatures — gentle movement, don't chase
    case 'drifter': {
      cr.vx = Math.cos(cr.phase + cr.t * 0.012) * 0.8;
      cr.vy = Math.sin(cr.phase * 1.3 + cr.t * 0.009) * 0.8;
      break; }
    case 'orb': {
      const oR = 55 + 20 * Math.sin(cr.t * 0.03);
      cr.x = cr.x + (hx - 80 + Math.cos(cr.phase + cr.t * 0.018) * oR - cr.x) * 0.05;
      cr.y = cr.y + (hy + Math.sin(cr.phase + cr.t * 0.018) * oR - cr.y) * 0.05;
      return; }
    case 'glider': {
      cr.vx = Math.cos(cr.angle + cr.t * 0.008) * 1.2;
      cr.vy = Math.sin(cr.phase + cr.t * 0.01) * 0.7;
      break; }
    case 'sparkle': {
      cr.vx = Math.cos(cr.phase + cr.t * 0.02) * 1.5;
      cr.vy = Math.sin(cr.t * 0.015) * 1.5;
      break; }
    case 'ring': {
      const rA = cr.phase + cr.t * 0.016;
      cr.x += (hx + Math.cos(rA) * 70 - cr.x) * 0.04;
      cr.y += (hy + Math.sin(rA) * 70 - cr.y) * 0.04;
      return; }
    case 'wisp': {
      cr.vx = Math.cos(cr.phase + cr.t * 0.011) * rand(0.5, 1.5);
      cr.vy = Math.sin(cr.phase * 1.7 + cr.t * 0.014) * rand(0.5, 1.5);
      break; }
    case 'bubble': {
      cr.vy -= 0.04;
      const bv = Math.hypot(cr.vx, cr.vy);
      if (bv > 1.8) { cr.vx = cr.vx / bv * 1.8; cr.vy = cr.vy / bv * 1.8; }
      if (cr.y < 0) cr.y = H;
      break; }
  }
  cr.x += cr.vx;
  cr.y += cr.vy;
}

function _checkCnstCreatureCollision(cr, hx, hy) {
  if (wInvincible > 0 || wSegs.length === 0) return;
  const dist = Math.hypot(hx - cr.x, hy - cr.y);
  if (dist > SEG_RADIUS + cr.r) return;

  cr.state = 'fading';
  cr.fadeAlpha = 1;

  // Beneficial: collect
  const def = CNST_DEFS[cr.cnstId];
  if (!def) return;

  if (def.type === 'beneficial') {
    score += 25 * Math.round(cnstScoreMult); updateHUD();
    triggerSnapEffect(hx, hy, '#f5e642', []);
    sfx.pixelCommon && sfx.pixelCommon();
    return;
  }

  if (def.type === 'wildcard') {
    // 50/50
    if (Math.random() < 0.5) {
      score += 15; updateHUD();
      triggerSnapEffect(hx, hy, '#00e5ff', []);
    } else {
      _cnstDamageWorm(hx, hy);
    }
    return;
  }

  // Harmful
  _cnstDamageWorm(hx, hy);
}

function _cnstDamageWorm(hx, hy) {
  const remove = Math.min(3, wSegs.length - 1);
  if (remove > 0) wSegs.splice(wSegs.length - remove, remove);
  wInvincible = 60;
  triggerSnapEffect(hx, hy, '#ff2d78', []);
  showToast('HIT!', 1200, '#ff2d78');
  sfx.damage && sfx.damage();
  if (wSegs.length <= 1) handleDeath();
}

// ── Draw scrolling stars ──────────────────────────────────────────────────────
function drawScrollingStars() {
  for (const s of bgScrollStars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Draw constellations ───────────────────────────────────────────────────────
function drawConstellations() {
  if (currentLevel !== 3) return;
  for (const c of constellations) {
    const def = c.def;
    const ox = c.screenX, oy = c.screenY;
    const alpha = c.opacity;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Draw constellation lines (animated during waking)
    const totalLines = def.lines.length;
    const visLines = Math.ceil(c.lineProgress * totalLines);
    ctx.strokeStyle = def.type === 'harmful' ? '#ff2d78'
                    : def.type === 'beneficial' ? '#f5e642' : '#00e5ff';
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 6;
    ctx.shadowColor = ctx.strokeStyle;
    for (let li = 0; li < visLines; li++) {
      const [a, b] = def.lines[li];
      const sa = def.stars[a], sb = def.stars[b];
      ctx.beginPath();
      ctx.moveTo(ox + sa.x, oy + sa.y);
      ctx.lineTo(ox + sb.x, oy + sb.y);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // Draw stars
    const starColor = def.type === 'harmful' ? '#ff6b9d'
                    : def.type === 'beneficial' ? '#ffe066' : '#66e5ff';
    for (let si = 0; si < def.stars.length; si++) {
      const s = def.stars[si];
      const isHeart = si === def.heartStar;
      ctx.fillStyle = isHeart ? '#ffffff' : starColor;
      if (isHeart) {
        // Pulsating heart star
        const pulse = 1 + 0.25 * Math.sin(c.heartPulse);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ffffff';
        _drawHeart(ox + s.x, oy + s.y, 7 * pulse, '#ffffff');
        ctx.restore();
      } else {
        const r = 2.5;
        ctx.beginPath();
        ctx.arc(ox + s.x, oy + s.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // State label (active only)
    if (c.state === 'active' || c.state === 'waking') {
      ctx.globalAlpha = alpha * 0.7;
      ctx.font = '8px "Space Mono", monospace';
      ctx.fillStyle = def.type === 'harmful' ? '#ff2d78'
                    : def.type === 'beneficial' ? '#f5e642' : '#00e5ff';
      ctx.textAlign = 'center';
      ctx.fillText(c.id.toUpperCase(), ox, oy - 80);
    }

    ctx.restore();
  }
}

function _drawHeart(cx, cy, size, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.3);
  ctx.bezierCurveTo(cx, cy - size * 0.1, cx - size, cy - size * 0.1, cx - size * 0.7, cy - size * 0.5);
  ctx.bezierCurveTo(cx - size * 0.35, cy - size, cx, cy - size * 0.5, cx, cy - size * 0.1);
  ctx.bezierCurveTo(cx, cy - size * 0.5, cx + size * 0.35, cy - size, cx + size * 0.7, cy - size * 0.5);
  ctx.bezierCurveTo(cx + size, cy - size * 0.1, cx, cy - size * 0.1, cx, cy + size * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Draw constellation creatures ──────────────────────────────────────────────
function drawCnstCreatures() {
  if (currentLevel !== 3) return;
  for (const cr of cnstCreatures) {
    if (cr.state === 'dead') continue;
    ctx.save();
    ctx.globalAlpha = cr.state === 'fading' ? cr.fadeAlpha : 1;
    ctx.translate(cr.x, cr.y);
    _drawCreatureShape(cr);
    ctx.restore();
  }
}

function _drawCreatureShape(cr) {
  switch (cr.type) {
    case 'meteor': {
      // Glowing streak
      ctx.strokeStyle = '#ff6633'; ctx.lineWidth = 2; ctx.shadowBlur = 8; ctx.shadowColor = '#ff6633';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-12 * Math.cos(cr.angle), -12 * Math.sin(cr.angle)); ctx.stroke();
      ctx.fillStyle = '#ffaa66'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
      break; }
    case 'spike': {
      ctx.strokeStyle = '#ff2d78'; ctx.lineWidth = 1.5; ctx.shadowBlur = 6; ctx.shadowColor = '#ff2d78';
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 + cr.t * 0.05;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*9, Math.sin(a)*9); ctx.stroke();
      }
      break; }
    case 'bolt': {
      ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#ffdd00';
      ctx.beginPath();
      ctx.moveTo(-4, -8); ctx.lineTo(2, -1); ctx.lineTo(-2, -1); ctx.lineTo(4, 8);
      ctx.stroke();
      break; }
    case 'snake': {
      ctx.strokeStyle = '#66ff66'; ctx.lineWidth = 2; ctx.shadowBlur = 5; ctx.shadowColor = '#66ff66';
      ctx.beginPath();
      for (let i = 0; i <= 8; i++) {
        const sx = (i - 4) * 2.5;
        const sy = Math.sin(cr.t * 0.1 + i * 0.8) * 5;
        i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
      }
      ctx.stroke();
      // Head dot
      ctx.fillStyle = '#66ff66'; ctx.beginPath(); ctx.arc(10, 0, 3, 0, Math.PI * 2); ctx.fill();
      break; }
    case 'wriggler': {
      ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 2.5; ctx.shadowBlur = 6; ctx.shadowColor = '#ff8800';
      ctx.beginPath();
      for (let i = 0; i <= 10; i++) {
        const wx = (i - 5) * 2;
        const wy = Math.sin(cr.t * 0.08 + i * 0.6) * 6;
        i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
      }
      ctx.stroke();
      break; }
    case 'pulsar': {
      const pr = 5 + 3 * Math.sin(cr.t * 0.1);
      ctx.strokeStyle = '#ff44aa'; ctx.lineWidth = 1.5; ctx.shadowBlur = 12; ctx.shadowColor = '#ff44aa';
      ctx.beginPath(); ctx.arc(0, 0, pr, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, pr * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff44aa'; ctx.fill();
      break; }
    case 'hornet': {
      // Triangle body
      ctx.fillStyle = '#ffcc00'; ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 1;
      ctx.shadowBlur = 5; ctx.shadowColor = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(7, 0); ctx.lineTo(-5, -5); ctx.lineTo(-5, 5); ctx.closePath();
      ctx.fill(); ctx.stroke();
      break; }
    case 'chaser': {
      ctx.fillStyle = '#ff2d78'; ctx.shadowBlur = 8; ctx.shadowColor = '#ff2d78';
      const ca = Math.atan2(cr.vy, cr.vx);
      ctx.rotate(ca);
      ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,-4); ctx.lineTo(-3,0); ctx.lineTo(-5,4); ctx.closePath();
      ctx.fill();
      break; }
    case 'twin': {
      ctx.fillStyle = '#cc66ff'; ctx.shadowBlur = 6; ctx.shadowColor = '#cc66ff';
      ctx.beginPath(); ctx.arc(-5, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 5, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#cc66ff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.stroke();
      break; }
    case 'rusher': {
      const rushPhase = cr.t % 180;
      const clr = rushPhase >= 120 ? '#ff0000' : '#aa2233';
      ctx.fillStyle = clr; ctx.shadowBlur = rushPhase >= 120 ? 14 : 4; ctx.shadowColor = clr;
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(-6,-5); ctx.lineTo(-6,5); ctx.closePath();
      ctx.fill();
      break; }
    case 'drifter': {
      const da = 0.3 * Math.sin(cr.t * 0.05);
      ctx.strokeStyle = '#aaff88'; ctx.lineWidth = 1; ctx.shadowBlur = 5; ctx.shadowColor = '#aaff88';
      ctx.beginPath(); ctx.arc(0, 0, 6 + da * 8, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(170,255,136,0.25)'; ctx.fill();
      break; }
    case 'orb': {
      const og = ctx.createRadialGradient(0,0,1,0,0,8);
      og.addColorStop(0,'#ffffff'); og.addColorStop(0.4,'#ffe066'); og.addColorStop(1,'rgba(255,224,102,0)');
      ctx.fillStyle = og; ctx.shadowBlur = 10; ctx.shadowColor = '#ffe066';
      ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
      break; }
    case 'glider': {
      ctx.fillStyle = '#88ccff'; ctx.shadowBlur = 6; ctx.shadowColor = '#88ccff';
      ctx.beginPath();
      ctx.moveTo(0,-6); ctx.lineTo(8,4); ctx.lineTo(0,1); ctx.lineTo(-8,4); ctx.closePath();
      ctx.fill();
      break; }
    case 'sparkle': {
      ctx.strokeStyle = '#ffaaff'; ctx.lineWidth = 1.5; ctx.shadowBlur = 8; ctx.shadowColor = '#ffaaff';
      for (let i = 0; i < 4; i++) {
        const sa = (i / 4) * Math.PI * 2 + cr.t * 0.06;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(sa)*8, Math.sin(sa)*8); ctx.stroke();
      }
      break; }
    case 'ring': {
      const ringR = 7 + 2 * Math.sin(cr.t * 0.05);
      ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.5; ctx.shadowBlur = 8; ctx.shadowColor = '#00ffcc';
      ctx.beginPath(); ctx.arc(0,0,ringR,0,Math.PI*2); ctx.stroke();
      break; }
    case 'wisp': {
      ctx.globalAlpha *= (0.5 + 0.5 * Math.sin(cr.t * 0.07));
      ctx.fillStyle = '#aaeeff'; ctx.shadowBlur = 10; ctx.shadowColor = '#aaeeff';
      ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
      break; }
    case 'bubble': {
      const ba = 0.4 + 0.4 * Math.abs(Math.sin(cr.t * 0.04));
      ctx.globalAlpha *= ba;
      ctx.strokeStyle = '#99ddff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.stroke();
      break; }
  }
}

// ── updateLevelHUD ────────────────────────────────────────────────────────────
function updateLevelHUD() {
  const el = document.getElementById('level-hud');
  if (!gameStarted) { el.classList.remove('visible'); return; }
  el.classList.add('visible');
  document.getElementById('level-hud-num').textContent  = `LEVEL ${currentLevel}`;
  document.getElementById('level-hud-name').textContent = LEVEL_DEFS[currentLevel - 1].name;
}

// ─── WORMHOLE ────────────────────────────────────────────────────────────────
const WORMHOLE_TOUCH_R = 80;

let wormhole          = null;
let wormholeFlashAlpha = 0;
let wormholeSegsEaten  = 0;
let wormholeExitSegs   = 0;
let wormholeEnterSpd   = 3.5; // set to levelBaseSpeed() on enter

function spawnWormhole() {
  if (!wSegs.length) return;
  const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
  let x, y, tries = 0;
  do {
    x = rand(90, W - 90); y = rand(90, H - 90); tries++;
  } while (Math.hypot(x - hx, y - hy) < 200 && tries < 60);
  wormhole = { x, y, vx: rand(-0.5,0.5), vy: rand(-0.5,0.5),
    angle: 0, pulse: 0, blinkT: 0, phase: 'active' };
  wormholeSegsEaten = 0; wormholeFlashAlpha = 0;
  wormholeExitSegs  = 0; wormholeEnterSpd  = levelBaseSpeed();
  sfx.wormholeOpen();
}

function updateWormhole() {
  if (!wormhole || !gameStarted || levelPaused) return;
  const wh = wormhole;
  wh.angle += 0.04; wh.pulse += 0.06; wh.blinkT++;

  if (wh.phase === 'active') {
    wh.x += wh.vx; wh.y += wh.vy;
    if (wh.x < 70 || wh.x > W - 70) wh.vx *= -1;
    if (wh.y < 70 || wh.y > H - 70) wh.vy *= -1;
    const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
    if (Math.hypot(hx - wh.x, hy - wh.y) < WORMHOLE_TOUCH_R) {
      wh.phase = 'eating'; wormholeSegsEaten = 0;
      wormholeEnterSpd = wSlowing ? SPEED_SLOW : levelBaseSpeed() + Math.min(wBoostMomentum, levelBoostCap() - levelBaseSpeed());
      sfx.wormholeEnter();
    }
  }

  if (wh.phase === 'eating') {
    wormholeEnterSpd = Math.min(12, wormholeEnterSpd + 0.22);
    const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
    const { dx, dy } = torusDelta(hx, hy, wh.x, wh.y);
    const dl = Math.hypot(dx, dy);
    if (dl > 1) { wTarget.x = dx / dl; wTarget.y = dy / dl; }
    if (wormholeSegsEaten < wSegs.length) wormholeSegsEaten++;
    if (wormholeSegsEaten >= wSegs.length) {
      wh.phase = 'flash'; wormholeFlashAlpha = 1.0;
    }
  }

  if (wh.phase === 'flash') {
    wormholeFlashAlpha -= 0.045;
    if (wormholeFlashAlpha <= 0) { wormholeFlashAlpha = 0; doLevelTransition(); }
  }

  if (wh.phase === 'exit') {
    // Reveal 4 segments per frame — fast enough to feel immediate
    wormholeExitSegs = Math.min(wSegs.length, wormholeExitSegs + 4);
    if (wormholeExitSegs >= wSegs.length && wh.blinkT >= 40) wormhole = null;
  }
}

function drawWormholeSprite() {
  if (!wormhole) return;
  const { x, y, angle, pulse, blinkT } = wormhole;
  const sc = 1 + Math.sin(pulse) * 0.07;
  for (let i = 5; i >= 0; i--) {
    const t = i / 5, col = wormColor(t);
    ctx.save();
    ctx.translate(x, y); ctx.rotate(angle + i * (Math.PI / 5));
    ctx.beginPath();
    ctx.ellipse(0, 0, (26 + i * 8) * sc, (13 + i * 4.5) * sc, 0, 0, Math.PI * 2);
    ctx.strokeStyle = col.css; ctx.shadowColor = col.css; ctx.shadowBlur = 10;
    ctx.lineWidth = 1.8; ctx.globalAlpha = 0.45 + t * 0.45; ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, 9 * sc, 0, Math.PI * 2);
  ctx.fillStyle = '#000'; ctx.fill(); ctx.restore();
  if (Math.floor(blinkT / 18) % 2 === 0) {
    ctx.save();
    ctx.font = '700 9px "Space Mono",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = CYAN; ctx.shadowColor = CYAN; ctx.shadowBlur = 8;
    ctx.fillText('WORMHOLE', x, y - 38 * sc);
    ctx.restore();
  }
}

// ─── LEVEL TRANSITIONS ───────────────────────────────────────────────────────
function initLevelThreats(n) {
  robins = []; robinSpawnTimer = 0;
  competitors = []; compRespawnTimers = [];
  blackHole = null; bhSpawnCounter = 0; bhPulling = false;
  bhSegsEaten = 0; bhPullSpd = levelBaseSpeed(); redWorms = [];
  poisonPixels = []; poisonExplosions = []; snapEffects = []; camShakeFrames = 0;
  // Feeder resets per level; intro toast only resets for full new game (n===1)
  feeder = null; feederSpawnTimer = 0; seedParticles = [];
  feederArrow = null; feederFirstDone = false; feederPos = null;
  alienShips = [];
  // Clear constellation state for all levels
  constellations = []; cnstCreatures = []; bgScrollStars = [];
  cnstScoreMult = 1; cnstScoreMultT = 0;
  cnstPoisonSafe = false; cnstPoisonSafeT = 0; cnstRainbowT = 0;
  cnstRetired = new Set(); cnstSpawnTimer = 0;
  if (n === 1) feederIntroShown = false;
  if (n === 1) initRobins();
  if (n >= 2)  initCompetitors();
  if (n === 2) initShips();    // Alien ships: Level 2 (THE BELT) only
  if (n === 3) initConstellations();
  if (n === 5) initRobins();  // The Void: robins return alongside competitors
}

function repositionWormAtCenter() {
  const cx = W / 2, cy = H / 2;
  const keep = Math.max(START_SEGS, wSegs.length);
  // Spread in a line so segments aren't all stacked — chain propagation needs separation
  wSegs = Array.from({ length: keep }, (_, i) => ({ x: cx - i * SEG_SPACING, y: cy }));
  wDir = { x: 1, y: 0 }; wTarget = { x: 1, y: 0 };
  wStopped = false; wBoosting = false; wSlowing = false; wGrow = 0; wInvincible = 220;
}

function doLevelTransition() {
  const next = Math.min(currentLevel + 1, 5);
  robins = []; robinSpawnTimer = 0;
  competitors = []; compRespawnTimers = [];
  blackHole = null; bhPulling = false; bhSegsEaten = 0;
  bhPullSpd = levelBaseSpeed(); bhSpawnCounter = 0; redWorms = [];
  alienShips = []; poisonExplosions = [];
  currentLevel = next;
  initLevelBackground(currentLevel);
  initPixels();
  initLevelThreats(currentLevel);
  repositionWormAtCenter();
  wormhole = { x: W / 2, y: H / 2, vx: 0, vy: 0,
    angle: 0, pulse: 0, blinkT: 0, phase: 'exit' };
  wormholeExitSegs = 1;
  sfx.levelUp();
  showLevelBanner(currentLevel);
}

function showLevelBanner(n) {
  levelPaused = true;
  const def = LEVEL_DEFS[n - 1];
  const banner = document.getElementById('level-banner');
  document.getElementById('lbn-sub').textContent  = `LEVEL ${n}`;
  document.getElementById('lbn-name').textContent = def.name;
  banner.style.opacity = '0';
  banner.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    banner.style.transition = 'opacity 0.3s ease';
    banner.style.opacity    = '1';
  }));
  setTimeout(() => {
    banner.style.transition = 'opacity 0.5s ease';
    banner.style.opacity    = '0';
    setTimeout(() => { banner.style.display = 'none'; levelPaused = false; }, 500);
  }, 2500);
}

function checkLevelThreshold() {
  if (wormhole || currentLevel >= 5 || !gameStarted) return;
  if (score >= LEVEL_DEFS[currentLevel - 1].threshold) spawnWormhole();
}

// ─── DEATH / RESPAWN PIPELINE ────────────────────────────────────────────────

// Entry point for all lethal collisions.
// Guards against re-entry; kicks off the visual death sequence.
// The ghost animation calls loseLife() when it finishes.
function handleDeath() {
  if (deathState !== null) return;  // already dying or game-over — ignore
  triggerDeath();
}

// Called by updateDeath() when the fade animation completes.
// Decrements lives and routes to respawn or game-over.
function loseLife() {
  lives = Math.max(0, lives - 1);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('sw_hiscore', String(highScore));
  }
  updateHUD();

  if (lives <= 0) {
    sfx.gameOver();
    deathState = 'game_over';
    deathT     = 0;
    gameOverT  = 0;
    return;
  }
  respawn();
}

// Rebuilds the worm at centre, clears death state, resumes play.
// Does NOT touch score, level, threats, or background.
function respawn() {
  wormhole           = null;
  wormholeFlashAlpha = 0;
  const banner = document.getElementById('level-banner');
  if (banner) banner.style.display = 'none';
  levelPaused    = false;
  deathState     = null;
  deathFadeAlpha = 0;
  deathParticles = [];
  const cx = W / 2, cy = H / 2;
  wSegs = Array.from({ length: START_SEGS }, (_, i) => ({
    x: cx - i * SEG_SPACING, y: cy,
  }));
  wDir     = { x: 1, y: 0 }; wTarget = { x: 1, y: 0 };
  wStopped = false; wBoosting = false; wSlowing = false;
  wGrow    = 0;
  wInvincible = 220;
  showToast('BACK IN ACTION', 2000, '#00e5ff');
}

// ─── COMPETITOR WORMS ────────────────────────────────────────────────────────
const COMP_GREEN      = '#00ff66';
const COMP_TURN_RATE  = 0.07;   // max radians/frame steering
const COMP_EAT_R      = 10;     // px: head-to-pixel eat radius
const COMP_HIT_R      = 10;     // px: added to player head radius for kill check
const COMP_RESPAWN_F  = 480;    // frames (≈8s at 60fps)

let competitors       = [];
let compRespawnTimers = [];     // countdown frames

function compBaseSpeed() { return currentLevel >= 4 ? 1.6 : 1.2; }

function compSpeed() {
  return Math.min(compBaseSpeed() + wSegs.length / 60, 3.2);
}

function makeCompetitor() {
  const length = rand(40, 80);
  const x = rand(60, W - 60), y = rand(60, H - 60);
  const angle = rand(0, Math.PI * 2);
  const trailCap = Math.ceil(length / compBaseSpeed()) + 6;
  return {
    x, y, angle, length,
    trail: Array.from({ length: trailCap }, () => ({ x, y })),
  };
}

function initCompetitors() {
  competitors = []; compRespawnTimers = [];
  const count = currentLevel >= 4 ? 4 : currentLevel >= 3 ? 3 : 2;
  for (let i = 0; i < count; i++) competitors.push(makeCompetitor());
}

function updateCompetitors() {
  if (!gameStarted || levelPaused) return;
  const spd = compSpeed();
  const hx  = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);

  // Respawn timers
  for (let i = compRespawnTimers.length - 1; i >= 0; i--) {
    if (--compRespawnTimers[i] <= 0) {
      competitors.push(makeCompetitor());
      compRespawnTimers.splice(i, 1);
    }
  }

  for (let ci = competitors.length - 1; ci >= 0; ci--) {
    const c = competitors[ci];

    // Steer: prefer Phase 1 poison pixels (within 320px); avoid Phase 2
    let nearDist = Infinity, targetAngle = c.angle;
    for (const pp of poisonPixels) {
      if (pp.age >= POISON_PHASE1) continue;   // green worms avoid Phase 2 pixels
      const { dx, dy } = torusDelta(c.x, c.y, pp.x, pp.y);
      const d = Math.hypot(dx, dy);
      if (d < nearDist && d < 320) { nearDist = d; targetAngle = Math.atan2(dy, dx); }
    }
    if (nearDist > 320) {
      for (const p of pixels) {
        const { dx, dy } = torusDelta(c.x, c.y, p.x, p.y);
        const d = Math.hypot(dx, dy);
        if (d < nearDist) { nearDist = d; targetAngle = Math.atan2(dy, dx); }
      }
    }
    let da = targetAngle - c.angle;
    while (da >  Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    c.angle += Math.sign(da) * Math.min(Math.abs(da), COMP_TURN_RATE);

    // Move (raw coords, wrap at draw time)
    c.x += Math.cos(c.angle) * spd;
    c.y += Math.sin(c.angle) * spd;

    // Update trail
    c.trail.unshift({ x: c.x, y: c.y });
    const cap = Math.ceil(c.length / spd) + 6;
    if (c.trail.length > cap) c.trail.length = cap;

    // Eat pixels (Phase 1 poison pixels first, then regular)
    const cx = wrapX(c.x), cy = wrapY(c.y);
    let atePoison = false;
    for (let pi = poisonPixels.length - 1; pi >= 0; pi--) {
      if (poisonPixels[pi].age >= POISON_PHASE1) continue;  // won't eat Phase 2
      if (torusDist(cx, cy, wrapX(poisonPixels[pi].x), wrapY(poisonPixels[pi].y)) < COMP_EAT_R + POISON_HIT_R) {
        poisonPixels.splice(pi, 1);
        atePoison = true; break;
      }
    }
    if (!atePoison) {
      for (let pi = pixels.length - 1; pi >= 0; pi--) {
        const p = pixels[pi];
        if (torusDist(cx, cy, p.x, p.y) < COMP_EAT_R + p.type.r) {
          c.length += 12; pixels.splice(pi, 1); spawnPixel(); break;
        }
      }
    }

    // Player head eats competitor (contact with any trail point)
    let eaten = false;
    for (const tp of c.trail) {
      if (torusDist(hx, hy, wrapX(tp.x), wrapY(tp.y)) < 11 + COMP_HIT_R) {
        eaten = true; break;
      }
    }
    if (eaten) {
      competitors.splice(ci, 1);
      score += 50; updateHUD(); checkLevelThreshold();
      sfx.competitorKill();
      showToast('COMPETITOR ELIMINATED!');
      compRespawnTimers.push(COMP_RESPAWN_F);
    }
  }
}

function drawCompetitors() {
  if (!gameStarted) return;
  for (const c of competitors) {
    const trail = c.trail;
    if (trail.length < 2) continue;
    const n = trail.length;

    for (let i = n - 1; i > 0; i--) {
      const t  = 1 - i / (n - 1);           // 0 = tail end, 1 = head end
      const ax = wrapX(trail[i].x),     ay = wrapY(trail[i].y);
      const bx = wrapX(trail[i - 1].x), by = wrapY(trail[i - 1].y);
      if (Math.abs(ax - bx) > W / 2 || Math.abs(ay - by) > H / 2) continue;

      ctx.save();
      ctx.strokeStyle = '#00ff66';
      ctx.shadowColor = COMP_GREEN;
      ctx.shadowBlur  = 5 + t * 6;          // head ≈1.6× tail blur
      ctx.lineWidth   = 2.5;
      ctx.lineCap     = 'round';
      ctx.globalAlpha = 0.12 + t * 0.78;
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      ctx.stroke(); ctx.restore();
    }

    // Leading-tip glow
    const tx = wrapX(trail[0].x), ty = wrapY(trail[0].y);
    ctx.save();
    ctx.fillStyle = COMP_GREEN; ctx.shadowColor = COMP_GREEN;
    ctx.shadowBlur = 18; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(tx, ty, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ─── BLACK HOLE & RED WORMS ──────────────────────────────────────────────────
const BH_RADIUS      = 22;    // visual + collision radius of singularity
const BH_PULL_R      = 30;    // px: head within this → sucked in
const BH_LIFETIME_F  = 840;   // ~14s at 60fps before auto-despawn
const BH_PIXEL_DRIFT = 0.35;  // fraction of force applied to nearby pixels
const RED_COLOR      = '#ff2200';
const RED_LIFESPAN   = 1500;  // frames
const RED_SPEED      = 2.2;
const RED_TURN_RATE  = 0.13;
const RED_LENGTH     = 38;    // px trail length
const RED_CHASE_SEGS = 4;     // target last N player segments

let blackHole        = null;  // { x, y, angle, t, lifetime, pulling, angle2, angle3 }
let bhSpawnCounter   = 0;
let bhInvertAlpha    = 0;     // 0–1 for screen-invert flash
let bhSegsEaten      = 0;     // segments streamed in during pull
let bhPullSpd        = 3.5; // set to levelBaseSpeed() on spawn
let bhPulling        = false; // true while worm is being sucked in
let redWorms         = [];    // array of red worm objects

/* ── helpers ── */
function bhSpawnChance() {
  if (currentLevel === 3) return 0.03;
  if (currentLevel >= 4)  return 0.08;
  return 0;
}
function bhSpawnInterval() { return currentLevel >= 4 ? 400 : 600; }

function spawnBlackHole() {
  if (blackHole) return;
  const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
  let x, y, tries = 0;
  do {
    x = rand(60, W - 60); y = rand(60, H - 60); tries++;
  } while (torusDist(x, y, hx, hy) < 180 && tries < 40);
  blackHole = { x, y, lifetime: BH_LIFETIME_F,
    angle: 0, angle2: Math.random() * Math.PI * 2, angle3: Math.random() * Math.PI * 2 };
}

function makeRedWorm(x, y) {
  const angle = Math.random() * Math.PI * 2;
  const cap   = Math.ceil(RED_LENGTH / RED_SPEED) + 6;
  return {
    x, y, angle, life: RED_LIFESPAN,
    trail: Array.from({ length: cap }, () => ({ x, y })),
  };
}

/* ── update ── */
function updateBlackHole() {
  if (!gameStarted || levelPaused) return;

  // Spawn logic
  if (!blackHole && !bhPulling && redWorms.length === 0) {
    bhSpawnCounter++;
    if (bhSpawnCounter >= bhSpawnInterval()) {
      bhSpawnCounter = 0;
      if (Math.random() < bhSpawnChance()) spawnBlackHole();
    }
  }

  // Decay invert flash
  if (bhInvertAlpha > 0) bhInvertAlpha = Math.max(0, bhInvertAlpha - 0.018);

  // Pull sequence
  if (bhPulling) {
    bhPullSpd = Math.min(14, bhPullSpd + 0.3);
    // Force worm direction toward black hole (raw coords)
    if (blackHole) {
      const { dx, dy } = torusDelta(wSegs[0].x, wSegs[0].y, blackHole.x, blackHole.y);
      const d = Math.hypot(dx, dy);
      if (d > 0) { wTarget.x = dx / d; wTarget.y = dy / d; }
    }
    bhSegsEaten++;
    if (bhSegsEaten >= wSegs.length) {
      // All consumed — invert flash, spawn red worms, close black hole
      bhInvertAlpha = 1.0;
      const count = Math.max(1, Math.floor(wSegs.length / 4));
      const ox = blackHole ? wrapX(blackHole.x + W / 2) : W / 2;
      const oy = blackHole ? wrapY(blackHole.y + H / 2) : H / 2;
      for (let i = 0; i < count; i++) {
        const ang = (i / count) * Math.PI * 2;
        redWorms.push(makeRedWorm(
          ox + Math.cos(ang) * 40,
          oy + Math.sin(ang) * 40));
      }
      // Scatter robins
      for (const r of robins) {
        r.vx = (Math.random() - 0.5) * 8;
        r.vy = -Math.abs(Math.random() * 6 + 3);
      }
      blackHole  = null;
      bhPulling  = false;
      bhPullSpd  = levelBaseSpeed();
      bhSegsEaten = 0;
      // Re-emerge worm at opposite side
      const ex = ox, ey = oy;
      const keep = Math.max(START_SEGS, Math.floor(wSegs.length * 0.5));
      wSegs = Array.from({ length: keep }, (_, i) => ({ x: ex - i * SEG_SPACING, y: ey }));
      wDir = { x: 1, y: 0 }; wTarget = { x: 1, y: 0 };
      wInvincible = 150;
    }
    return;
  }

  if (!blackHole) return;

  // Rotate rings
  blackHole.angle  += 0.018;
  blackHole.angle2 -= 0.013;
  blackHole.angle3 += 0.009;

  // Lifetime
  blackHole.lifetime--;
  if (blackHole.lifetime <= 0) { blackHole = null; return; }

  // Drift pixels toward black hole
  const bhx = blackHole.x, bhy = blackHole.y;
  for (const p of pixels) {
    const { dx, dy } = torusDelta(p.x, p.y, bhx, bhy);
    const d = Math.max(1, Math.hypot(dx, dy));
    if (d < 200) {
      const f = BH_PIXEL_DRIFT * (1 - d / 200);
      p.x += (dx / d) * f * 3;
      p.y += (dy / d) * f * 3;
    }
    // Pixel consumed by black hole
    if (d < BH_RADIUS + 4) {
      const idx = pixels.indexOf(p);
      if (idx !== -1) { pixels.splice(idx, 1); spawnPixel(); }
    }
  }

  // Check if player head is close enough to be sucked in
  const hx2 = wrapX(wSegs[0].x), hy2 = wrapY(wSegs[0].y);
  if (torusDist(hx2, hy2, bhx, bhy) < BH_PULL_R && wInvincible === 0) {
    bhPulling   = true;
    bhSegsEaten = 0;
    bhPullSpd   = levelBaseSpeed();
    sfx.blackHole();
  }
}

function updateRedWorms() {
  if (!gameStarted || levelPaused) return;

  const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
  const n  = wSegs.length;

  for (let ri = redWorms.length - 1; ri >= 0; ri--) {
    const r = redWorms[ri];
    r.life--;

    // Erratic turn + steer toward last RED_CHASE_SEGS player segments
    let targetAngle = r.angle + (Math.random() - 0.5) * 0.4; // erratic jitter
    let nearDist = Infinity;
    const startSeg = Math.max(0, n - RED_CHASE_SEGS);
    for (let si = startSeg; si < n; si++) {
      const sx = wrapX(wSegs[si].x), sy = wrapY(wSegs[si].y);
      const { dx, dy } = torusDelta(r.x, r.y, sx, sy);
      const d = Math.hypot(dx, dy);
      if (d < nearDist) { nearDist = d; targetAngle = Math.atan2(dy, dx); }
    }
    let da = targetAngle - r.angle;
    while (da >  Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    r.angle += Math.sign(da) * Math.min(Math.abs(da), RED_TURN_RATE);

    r.x += Math.cos(r.angle) * RED_SPEED;
    r.y += Math.sin(r.angle) * RED_SPEED;

    const cap = Math.ceil(RED_LENGTH / RED_SPEED) + 6;
    r.trail.unshift({ x: r.x, y: r.y });
    if (r.trail.length > cap) r.trail.length = cap;

    // Check: player head touches front 15px of red worm → score + kill
    const rhx = wrapX(r.trail[0].x), rhy = wrapY(r.trail[0].y);
    if (torusDist(hx, hy, rhx, rhy) < 11 + 8) {
      redWorms.splice(ri, 1);
      score += 75; updateHUD();
      sfx.redWormEaten();
      showToast('RED WORM EATEN! +75');
      continue;
    }

    // Check: red worm head touches last RED_CHASE_SEGS player segs → tail bite
    if (wInvincible === 0) {
      for (let si = startSeg; si < n; si++) {
        const sx = wrapX(wSegs[si].x), sy = wrapY(wSegs[si].y);
        if (torusDist(rhx, rhy, sx, sy) < 10) {
          // Remove 3 tail segments
          const remove = Math.min(3, wSegs.length - START_SEGS);
          if (remove > 0) wSegs.splice(wSegs.length - remove, remove);
          wInvincible = 90;
          sfx.tailBite();
          showToast('TAIL BITTEN!');
          break;
        }
      }
    }

    // Lifespan expired → fade handled in draw, remove when life === 0
    if (r.life <= 0) redWorms.splice(ri, 1);
  }
}

/* ── draw ── */
function drawBlackHole() {
  if (!gameStarted) return;
  if (!blackHole) return;

  const { x: bx, y: by, angle, angle2, angle3, lifetime } = blackHole;
  const alpha = Math.min(1, lifetime / 60);  // fade in/out at end

  ctx.save();
  ctx.globalAlpha = alpha;

  // Gravitational haze
  const haze = ctx.createRadialGradient(bx, by, 0, bx, by, 120);
  haze.addColorStop(0,   'rgba(80,0,120,0.28)');
  haze.addColorStop(0.5, 'rgba(40,0,60,0.10)');
  haze.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = haze;
  ctx.beginPath(); ctx.arc(bx, by, 120, 0, Math.PI * 2); ctx.fill();

  // Rotating ellipses (accretion disk rings)
  const rings = [
    { a: angle,  rx: 52, ry: 14, color: '#9900cc', op: 0.55 },
    { a: angle2, rx: 44, ry: 10, color: '#cc00ff', op: 0.45 },
    { a: angle3, rx: 36, ry:  7, color: '#ff00aa', op: 0.4  },
    { a: angle + 1.2, rx: 62, ry: 18, color: '#660099', op: 0.35 },
  ];
  for (const ring of rings) {
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(ring.a);
    ctx.globalAlpha = alpha * ring.op;
    ctx.strokeStyle = ring.color;
    ctx.shadowColor = ring.color;
    ctx.shadowBlur  = 8;
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, ring.rx, ring.ry, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Black singularity core
  ctx.globalAlpha = alpha;
  const core = ctx.createRadialGradient(bx, by, 0, bx, by, BH_RADIUS);
  core.addColorStop(0,   '#000000');
  core.addColorStop(0.7, '#0a0010');
  core.addColorStop(1,   'rgba(60,0,80,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(bx, by, BH_RADIUS + 4, 0, Math.PI * 2); ctx.fill();

  // Label
  ctx.globalAlpha = alpha * 0.75;
  ctx.fillStyle   = '#cc66ff';
  ctx.font        = '700 7px "Space Mono", monospace';
  ctx.textAlign   = 'center';
  ctx.fillText('BLACK HOLE', bx, by - BH_RADIUS - 7);

  ctx.restore();
}

function drawRedWorms() {
  if (!gameStarted) return;
  for (const r of redWorms) {
    const trail = r.trail;
    if (trail.length < 2) continue;
    const nt   = trail.length;
    const fade = r.life < 120 ? r.life / 120 : 1;

    for (let i = nt - 1; i > 0; i--) {
      const t  = 1 - i / (nt - 1);
      const ax = wrapX(trail[i].x),     ay = wrapY(trail[i].y);
      const bx = wrapX(trail[i - 1].x), by = wrapY(trail[i - 1].y);
      if (Math.abs(ax - bx) > W / 2 || Math.abs(ay - by) > H / 2) continue;

      ctx.save();
      ctx.strokeStyle = RED_COLOR;
      ctx.shadowColor = RED_COLOR;
      ctx.shadowBlur  = 5 + t * 8;
      ctx.lineWidth   = 2.5;
      ctx.lineCap     = 'round';
      ctx.globalAlpha = fade * (0.12 + t * 0.80);
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      ctx.stroke(); ctx.restore();
    }

    // Head tip
    const hx2 = wrapX(trail[0].x), hy2 = wrapY(trail[0].y);
    ctx.save();
    ctx.fillStyle   = RED_COLOR; ctx.shadowColor = RED_COLOR;
    ctx.shadowBlur  = 18; ctx.globalAlpha = fade * 0.9;
    ctx.beginPath(); ctx.arc(hx2, hy2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
const toastEl = document.getElementById('toast');
let toastTimer = null;

function showToast(msg, duration = 1800, color = null) {
  toastEl.textContent   = msg;
  toastEl.style.color   = color || '';
  toastEl.style.textShadow = color ? `0 0 10px ${color}, 0 0 22px ${color}88` : '';
  toastEl.style.borderColor = color ? `${color}88` : '';
  toastEl.classList.add('visible');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('visible');
    toastTimer = null;
  }, duration);
}

// ─── DEATH SEQUENCE ──────────────────────────────────────────────────────────
// States: null → 'shatter' → 'ghost' → 'fade' → 'game_over'
let deathState      = null;
let deathT          = 0;
let deathParticles  = [];   // exploding worm segments
let ghostChain      = null; // Array<{x,y}> — 10 segments
let ghostOpacity    = 0;
let ghostHeadX      = 0;
let ghostHeadY      = 0;
let ghostVY         = 1.8;  // rising speed, accelerates
let ghostSparkles   = [];   // {x,y,vx,vy,alpha}
let deathFadeAlpha  = 0;
let gameOverT       = 0;
let highScore       = parseInt(localStorage.getItem('sw_hiscore') || '0', 10);

const GHOST_SEGS    = 10;
const GHOST_SPACING = 20;
const GHOST_R       = 10;

function triggerDeath() {
  if (deathState !== null) return;   // already dying
  sfx.death();
  camShakeFrames = 18;

  // Snapshot worm segments → particles
  deathParticles = wSegs.map((seg, i) => {
    const t     = i / Math.max(wSegs.length - 1, 1);
    const col   = wormColor(t).css;
    const angle = rand(0, Math.PI * 2);
    const spd   = rand(2.2, 5.2);
    return {
      x: wrapX(seg.x), y: wrapY(seg.y),
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      col, life: 40, maxLife: 50,
    };
  });

  // Save head position for ghost
  ghostHeadX = wSegs.length > 0 ? wrapX(wSegs[0].x) : W / 2;
  ghostHeadY = wSegs.length > 0 ? wrapY(wSegs[0].y) : H / 2;

  wSegs = [];   // worm disappears (replaced by particles)
  wormhole = null;
  deathState  = 'shatter';
  deathT      = 0;
  ghostChain  = null;
  ghostVY     = 1.8;
  ghostSparkles = [];
  ghostOpacity  = 0;
  deathFadeAlpha = 0;
}

function _spawnGhost() {
  // Build 10-seg ghost chain hanging below head
  ghostChain = [];
  for (let i = 0; i < GHOST_SEGS; i++) {
    ghostChain.push({ x: ghostHeadX, y: ghostHeadY + i * GHOST_SPACING });
  }
  ghostOpacity = 0.9;
}

function updateDeath() {
  if (!deathState) return;
  deathT++;

  if (deathState === 'shatter') {
    for (let i = deathParticles.length - 1; i >= 0; i--) {
      const p = deathParticles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.93; p.vy *= 0.93;
      p.life--;
      if (p.life <= 0) deathParticles.splice(i, 1);
    }
    if (deathT === 35) {
      _spawnGhost();
      deathState = 'ghost';
      deathT     = 0;
    }

  } else if (deathState === 'ghost') {
    // Accelerate rise
    ghostVY = Math.min(ghostVY + 0.012, 3.0);
    ghostHeadY -= ghostVY;
    ghostHeadX += Math.sin(deathT * 0.038) * 0.7;

    // Chain follows head
    ghostChain[0].x = ghostHeadX;
    ghostChain[0].y = ghostHeadY;
    for (let i = 1; i < ghostChain.length; i++) {
      const prev = ghostChain[i - 1], curr = ghostChain[i];
      const dx = curr.x - prev.x, dy = curr.y - prev.y;
      const dist = Math.hypot(dx, dy);
      if (dist > GHOST_SPACING) {
        const over = dist - GHOST_SPACING;
        curr.x -= (dx / dist) * over;
        curr.y -= (dy / dist) * over;
      }
    }

    // Fade out over 145 frames
    ghostOpacity = Math.max(0, 0.9 - deathT / 145 * 0.9);

    // Sparkles off body
    if (deathT % 8 < 3) {
      const si  = Math.floor(rand(0, ghostChain.length));
      const seg = ghostChain[si];
      ghostSparkles.push({
        x: seg.x + rand(-6, 6), y: seg.y + rand(-6, 6),
        vx: rand(-0.4, 0.4), vy: rand(-1.4, -0.5),
        alpha: 0.9,
      });
    }
    for (let i = ghostSparkles.length - 1; i >= 0; i--) {
      const sp = ghostSparkles[i];
      sp.x += sp.vx; sp.y += sp.vy; sp.alpha -= 0.022;
      if (sp.alpha <= 0) ghostSparkles.splice(i, 1);
    }

    if (ghostOpacity <= 0 || ghostHeadY < -60) {
      ghostChain  = null;
      ghostSparkles = [];
      deathState  = 'fade';
      deathT      = 0;
      deathFadeAlpha = 0;
    }

  } else if (deathState === 'fade') {
    deathFadeAlpha = Math.min(1, deathT / 18);
    if (deathT >= 18) {
      loseLife();  // decrements lives, calls respawn() or triggers game_over
    }

  } else if (deathState === 'game_over') {
    gameOverT++;
    deathFadeAlpha = Math.min(0.88, deathFadeAlpha + 0.04);
  }
}

function drawDeath() {
  // Shatter particles
  for (const p of deathParticles) {
    const fade = p.life / p.maxLife;
    const col  = p.life > 25 ? p.col : '#ffffff';
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.fillStyle   = col;
    ctx.shadowColor = col;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, SEG_RADIUS * 0.85, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Ghost sparkles
  for (const sp of ghostSparkles) {
    ctx.save();
    ctx.globalAlpha = sp.alpha;
    ctx.fillStyle   = '#ffffff';
    ctx.shadowColor = '#aaddff';
    ctx.shadowBlur  = 8;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Ghost worm
  if (ghostChain && ghostOpacity > 0) {
    ctx.save();
    ctx.globalAlpha = ghostOpacity;

    // Body segments (tail to head so head renders on top)
    for (let i = ghostChain.length - 1; i >= 0; i--) {
      const seg = ghostChain[i];
      const r   = i === 0 ? GHOST_R + 2 : GHOST_R;
      ctx.fillStyle   = '#aaddff';
      ctx.shadowColor = 'rgba(180,220,255,0.6)';
      ctx.shadowBlur  = 20;
      ctx.beginPath(); ctx.arc(seg.x, seg.y, r, 0, Math.PI * 2); ctx.fill();
    }

    // Ghost face on head segment
    const hx = ghostChain[0].x, hy = ghostChain[0].y;
    const fr  = GHOST_R + 2;

    // Halo
    ctx.strokeStyle = 'rgba(255,255,255,0.30)';
    ctx.lineWidth   = 1.2;
    ctx.shadowBlur  = 0;
    ctx.beginPath(); ctx.arc(hx, hy - fr - 5, 6, 0, Math.PI * 2); ctx.stroke();

    // Eyes (two white dots)
    ctx.fillStyle   = '#ffffff';
    ctx.shadowBlur  = 0;
    ctx.beginPath(); ctx.arc(hx - 4, hy - 2, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx + 4, hy - 2, 2.5, 0, Math.PI * 2); ctx.fill();

    // Surprised O mouth
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.arc(hx, hy + 4, 2.8, 0, Math.PI * 2); ctx.stroke();

    ctx.restore();
  }

  // Black fade overlay (fade-to-black and game-over background)
  if (deathFadeAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = deathFadeAlpha;
    ctx.fillStyle   = '#000000';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // Game over screen
  if (deathState === 'game_over') {
    _drawGameOver();
  }
}

function _drawGameOver() {
  const cx = W / 2, cy = H / 2;

  // "GAME OVER"
  ctx.save();
  ctx.textAlign  = 'center';
  ctx.textBaseline = 'middle';
  ctx.font       = `700 ${Math.floor(W * 0.11)}px "Space Mono",monospace`;
  ctx.fillStyle  = PINK;
  ctx.shadowColor = PINK;
  ctx.shadowBlur  = 30;
  ctx.fillText('GAME OVER', cx, cy - 80);
  ctx.shadowBlur  = 60;
  ctx.globalAlpha = 0.4;
  ctx.fillText('GAME OVER', cx, cy - 80);
  ctx.restore();

  // Final score
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.font         = '700 18px "Space Mono",monospace';
  ctx.fillStyle    = CYAN;
  ctx.shadowColor  = CYAN;
  ctx.shadowBlur   = 12;
  ctx.fillText(`SCORE  ${String(score).padStart(6, '0')}`, cx, cy - 18);
  ctx.restore();

  // High score
  const newHi = score >= highScore && score > 0;
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.font         = '400 13px "Space Mono",monospace';
  ctx.fillStyle    = newHi ? YELLOW : MUTED;
  ctx.shadowColor  = newHi ? YELLOW : 'transparent';
  ctx.shadowBlur   = newHi ? 10 : 0;
  ctx.fillText(
    newHi ? `✦ NEW BEST  ${String(highScore).padStart(6,'0')} ✦`
           : `BEST   ${String(highScore).padStart(6, '0')}`,
    cx, cy + 14
  );
  ctx.restore();

  // Blinking "— INSERT COIN —"
  if (Math.floor(gameOverT / 30) % 2 === 0) {
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = '700 12px "Space Mono",monospace';
    ctx.fillStyle    = YELLOW;
    ctx.shadowColor  = YELLOW;
    ctx.shadowBlur   = 8;
    ctx.fillText('— INSERT COIN —', cx, cy + 52);
    ctx.restore();
  }

  // Ghost memorial icon (bottom-left corner)
  _drawGhostIcon(42, H - 42, 0.72);
}

/* Tiny static ghost icon at (gx,gy) with given opacity */
function _drawGhostIcon(gx, gy, alpha) {
  const r = 10, segs = 5, sp = 14;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Body chain
  for (let i = segs - 1; i >= 0; i--) {
    ctx.fillStyle   = '#aaddff';
    ctx.shadowColor = 'rgba(180,220,255,0.5)';
    ctx.shadowBlur  = 12;
    ctx.beginPath();
    ctx.arc(gx, gy + i * sp, i === 0 ? r + 2 : r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Halo
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth   = 1;
  ctx.shadowBlur  = 0;
  ctx.beginPath(); ctx.arc(gx, gy - r - 5, 6, 0, Math.PI * 2); ctx.stroke();

  // Face
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(gx - 3.5, gy - 2, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx + 3.5, gy - 2, 2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(gx, gy + 3.5, 2.2, 0, Math.PI * 2); ctx.stroke();

  ctx.restore();
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keysDown = new Set();

document.addEventListener('keydown', e => {
  keysDown.add(e.code);

  if (!gameStarted) { startGame(); return; }

  // During death: game-over screen → any key returns to menu
  if (deathState === 'game_over' && gameOverT > 60) {
    _endGameOver(); return;
  }
  if (deathState !== null) return;  // block all input during death sequence

  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': setTarget( 0, -1); break;
    case 'ArrowDown':  case 'KeyS': setTarget( 0,  1); break;
    case 'ArrowLeft':  case 'KeyA': setTarget(-1,  0); break;
    case 'ArrowRight': case 'KeyD': setTarget( 1,  0); break;
    case 'Space':
      e.preventDefault();
      wStopped = !wStopped;
      break;
    case 'KeyX':
      e.preventDefault();
      wSlowing = true;
      break;
    case 'ShiftLeft': case 'ShiftRight': case 'KeyZ':
      wBoosting = true;
      break;
  }
});

document.addEventListener('keyup', e => {
  keysDown.delete(e.code);
  switch (e.code) {
    case 'ShiftLeft': case 'ShiftRight': case 'KeyZ':
      wBoosting = false;
      break;
    case 'KeyX':
      wSlowing = false;
      break;
  }
});

function setTarget(x, y) {
  // Prevent reversing into self: ignore exact opposite direction
  if (wSegs.length > 1) {
    const dx = wSegs[0].x - wSegs[1].x;
    const dy = wSegs[0].y - wSegs[1].y;
    const dl = Math.hypot(dx, dy) || 1;
    const nx = dx / dl, ny = dy / dl;
    // dot product of proposed vs current velocity
    if (x * nx + y * ny < -0.7) return;
  }
  wTarget.x = x;
  wTarget.y = y;
}

// ─── MOBILE CONTROLS ─────────────────────────────────────────────────────────
const mobileControls = document.getElementById('mobile-controls');
const joystickZone   = document.getElementById('joystick-zone');
const joystickKnob   = document.getElementById('joystick-knob');
const btnBoost       = document.getElementById('btn-boost');
const btnSlow        = document.getElementById('btn-slow');
const btnStop        = document.getElementById('btn-stop');
const MAX_KNOB_DIST  = 44;

let joystickActive = false;
let joystickOriginX = 0;
let joystickOriginY = 0;
let joystickTouchId = null;

function initMobileControls() {
  if (navigator.maxTouchPoints > 0) {
    mobileControls.classList.add('visible');
  }

  // Joystick
  joystickZone.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameStarted) { startGame(); }
    const t = e.changedTouches[0];
    joystickActive  = true;
    joystickTouchId = t.identifier;
    const rect = joystickZone.getBoundingClientRect();
    joystickOriginX = rect.left + rect.width  / 2;
    joystickOriginY = rect.top  + rect.height / 2;
    updateJoystick(t.clientX, t.clientY);
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!joystickActive) return;
    for (const t of e.changedTouches) {
      if (t.identifier === joystickTouchId) {
        e.preventDefault();
        updateJoystick(t.clientX, t.clientY);
        break;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === joystickTouchId) {
        joystickActive  = false;
        joystickTouchId = null;
        joystickKnob.style.transform = 'translate(-50%, -50%)';
        wTarget = { ...wDir }; // keep current direction
        break;
      }
    }
  });

  // Boost button
  btnBoost.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameStarted) startGame();
    wBoosting = true;
    btnBoost.classList.add('active');
  }, { passive: false });
  btnBoost.addEventListener('touchend', () => {
    wBoosting = false;
    btnBoost.classList.remove('active');
  });

  // Slow button
  btnSlow.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameStarted) startGame();
    wSlowing = true;
    btnSlow.classList.add('active');
  }, { passive: false });
  btnSlow.addEventListener('touchend', () => {
    wSlowing = false;
    btnSlow.classList.remove('active');
  });

  // Stop button
  btnStop.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameStarted) startGame();
    wStopped = !wStopped;
    btnStop.classList.toggle('active', wStopped);
  }, { passive: false });
}

function updateJoystick(cx, cy) {
  let dx = cx - joystickOriginX;
  let dy = cy - joystickOriginY;
  const dist = Math.hypot(dx, dy);
  const clamped = Math.min(dist, MAX_KNOB_DIST);
  if (dist > 0) { dx = dx / dist * clamped; dy = dy / dist * clamped; }

  joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

  if (dist > 8) {
    wTarget.x = dx / MAX_KNOB_DIST;
    wTarget.y = dy / MAX_KNOB_DIST;
    const len = Math.hypot(wTarget.x, wTarget.y);
    if (len > 0) { wTarget.x /= len; wTarget.y /= len; }
  }
}

let audioCtx = null;
let soundEnabled = localStorage.getItem('sw_sound') !== 'off';

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

})();

  document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
});

/* ── low-level helpers ── */
function sfxTone({ type = 'sine', freq = 440, freqEnd, duration = 0.1,
                   gain = 0.22, gainEnd = 0, attack = 0.004, startTime }) {
  if (!soundEnabled) return;
  const ac  = getAudioCtx();
  const t0  = startTime !== undefined ? startTime : ac.currentTime;
  const osc = ac.createOscillator();
  const gn  = ac.createGain();
  osc.connect(gn); gn.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 0.01), t0 + duration);
  gn.gain.setValueAtTime(0, t0);
  gn.gain.linearRampToValueAtTime(gain, t0 + attack);
  gn.gain.exponentialRampToValueAtTime(Math.max(gainEnd, 0.0001), t0 + duration);
  osc.start(t0);
  osc.stop(t0 + duration + 0.01);
}

function sfxNoise({ duration = 0.2, gain = 0.18, filterFreq = 800, filterFreqEnd, attack = 0.01 }) {
  if (!soundEnabled) return;
  const ac     = getAudioCtx();
  const t0     = ac.currentTime;
  const bufLen = Math.ceil(ac.sampleRate * duration);
  const buf    = ac.createBuffer(1, bufLen, ac.sampleRate);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const src    = ac.createBufferSource();
  src.buffer   = buf;
  const filt   = ac.createBiquadFilter();
  filt.type    = 'lowpass';
  filt.frequency.setValueAtTime(filterFreq, t0);
  if (filterFreqEnd !== undefined) filt.frequency.exponentialRampToValueAtTime(Math.max(filterFreqEnd, 20), t0 + duration);
  const gn     = ac.createGain();
  gn.gain.setValueAtTime(0, t0);
  gn.gain.linearRampToValueAtTime(gain, t0 + attack);
  gn.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  src.connect(filt); filt.connect(gn); gn.connect(ac.destination);
  src.start(t0); src.stop(t0 + duration + 0.02);
}

/* ── named sound effects ── */
const sfx = {
  pixelCommon() {
    sfxTone({ type: 'sine', freq: 440, freqEnd: 660, duration: 0.08, gain: 0.18 });
  },
  pixelBig() {
    // Two-tone ascending chirp
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'sine', freq: 440, freqEnd: 660, duration: 0.06, gain: 0.20, startTime: t0 });
    sfxTone({ type: 'sine', freq: 660, freqEnd: 880, duration: 0.07, gain: 0.24, startTime: t0 + 0.05 });
  },
  wormGrow() {
    sfxTone({ type: 'triangle', freq: 180, duration: 0.06, gain: 0.12, gainEnd: 0 });
  },
  damage() {
    // Descending warble — sawtooth 400→180
    sfxTone({ type: 'sawtooth', freq: 400, freqEnd: 180, duration: 0.20, gain: 0.28 });
  },
  robinHit() {
    sfxTone({ type: 'square', freq: 120, duration: 0.15, gain: 0.20 });
  },
  clawGrab() {
    // Mechanical click-buzz: quick square burst + noise tick
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'square', freq: 260, freqEnd: 80, duration: 0.10, gain: 0.22, startTime: t0 });
    sfxNoise({ duration: 0.08, gain: 0.14, filterFreq: 3000, filterFreqEnd: 400, attack: 0.002 });
  },
  competitorKill() {
    // Three ascending notes, Space Invaders style
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'square', freq: 330, duration: 0.07, gain: 0.20, startTime: t0 });
    sfxTone({ type: 'square', freq: 440, duration: 0.07, gain: 0.20, startTime: t0 + 0.08 });
    sfxTone({ type: 'square', freq: 660, duration: 0.10, gain: 0.24, startTime: t0 + 0.16 });
  },
  wormholeOpen() {
    sfxTone({ type: 'sine', freq: 200, freqEnd: 800, duration: 0.60, gain: 0.22 });
  },
  wormholeEnter() {
    // Descending whoosh
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'sine',     freq: 600, freqEnd: 60,  duration: 0.80, gain: 0.22, startTime: t0 });
    sfxNoise({ duration: 0.70, gain: 0.12, filterFreq: 2000, filterFreqEnd: 100, attack: 0.04 });
  },
  blackHole() {
    // Low rumble: noise + rising sub tone
    sfxNoise({ duration: 1.2, gain: 0.22, filterFreq: 120, filterFreqEnd: 40, attack: 0.15 });
    sfxTone({ type: 'sine', freq: 55, freqEnd: 30, duration: 1.2, gain: 0.18 });
  },
  levelUp() {
    // Four-note ascending fanfare
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    [[262, 0.00], [330, 0.12], [392, 0.24], [523, 0.37]].forEach(([f, dt]) =>
      sfxTone({ type: 'square', freq: f, duration: 0.10, gain: 0.22, startTime: t0 + dt })
    );
  },
  extraLife() {
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'sine', freq: 440, duration: 0.14, gain: 0.22, startTime: t0 });
    sfxTone({ type: 'sine', freq: 660, duration: 0.18, gain: 0.26, startTime: t0 + 0.15 });
  },
  death() {
    if (!soundEnabled) return;
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    // Phase 1: single high clear tone (0ms, 100ms)
    sfxTone({ type: 'sine', freq: 880, duration: 0.10, gain: 0.45, startTime: t0 });
    // Phase 2: descending warble with rapid vibrato (80ms, 900ms)
    const osc2 = ac.createOscillator(), gn2 = ac.createGain();
    const lfo  = ac.createOscillator(), lfg = ac.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(660, t0 + 0.08);
    osc2.frequency.exponentialRampToValueAtTime(80, t0 + 0.98);
    lfo.frequency.value = 18;
    lfg.gain.value = 40;
    lfo.connect(lfg); lfg.connect(osc2.frequency);
    gn2.gain.setValueAtTime(0.35, t0 + 0.08);
    gn2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.98);
    osc2.connect(gn2); gn2.connect(ac.destination);
    lfo.start(t0 + 0.08); osc2.start(t0 + 0.08);
    lfo.stop(t0 + 0.99);  osc2.stop(t0 + 0.99);
    // Phase 3: low gurgle (600ms, 400ms)
    sfxTone({ type: 'sawtooth', freq: 60, duration: 0.40, gain: 0.15, startTime: t0 + 0.60 });
    // Phase 4: final fading tone (900ms, 600ms)
    sfxTone({ type: 'sine', freq: 120, duration: 0.60, gain: 0.30, gainEnd: 0, startTime: t0 + 0.90 });
  },
  gameOver() {
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'sawtooth', freq: 392, duration: 0.16, gain: 0.24, startTime: t0 });
    sfxTone({ type: 'sawtooth', freq: 294, duration: 0.18, gain: 0.24, startTime: t0 + 0.18 });
    sfxTone({ type: 'sawtooth', freq: 196, duration: 0.28, gain: 0.28, startTime: t0 + 0.38 });
  },
  redWormEaten() {
    // Higher pitch variant of competitor kill
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxTone({ type: 'square', freq: 440, duration: 0.07, gain: 0.20, startTime: t0 });
    sfxTone({ type: 'square', freq: 660, duration: 0.07, gain: 0.22, startTime: t0 + 0.08 });
    sfxTone({ type: 'square', freq: 880, duration: 0.10, gain: 0.26, startTime: t0 + 0.16 });
  },
  tailBite() {
    sfxTone({ type: 'sawtooth', freq: 320, freqEnd: 140, duration: 0.18, gain: 0.26 });
  },
  snap() {
    // NES cartridge yank: short noise burst + descending sawtooth zap
    const ac = getAudioCtx(); const t0 = ac.currentTime;
    sfxNoise({ duration: 0.04, gain: 0.28, filterFreq: 4800, filterFreqEnd: 600, attack: 0.001 });
    sfxTone({ type: 'sawtooth', freq: 300, freqEnd: 80, duration: 0.18, gain: 0.32, startTime: t0 + 0.008 });
  },
  poisonExplode() {
    // Sharp crack: white-noise burst 80ms, punchy
    sfxNoise({ duration: 0.08, gain: 0.38, filterFreq: 7000, filterFreqEnd: 180, attack: 0.001 });
  },
};

// ─── SPEED INDICATOR ─────────────────────────────────────────────────────────
const spdIndicator = document.getElementById('speed-indicator');
const spdBars = [1,2,3,4,5].map(i => document.getElementById('spd' + i));

function updateSpeedIndicator() {
  if (!gameStarted) { spdIndicator.classList.remove('visible'); return; }
  spdIndicator.classList.add('visible');

  // Compute a 0–1 normalized speed value across the level's range
  // 0 = slow/stopped, 0.4 = base, 1 = boost cap
  let norm;
  if (wStopped) {
    norm = 0;
  } else {
    const base  = levelBaseSpeed();
    const cap   = levelBoostCap();
    const burst = Math.min(wSpeedBurst, base);
    const boostM = Math.min(wBoostMomentum, cap - base);
    const current = wSlowing ? SPEED_SLOW : base + boostM + burst;
    // Map SPEED_SLOW→base as 0→0.4, base→cap as 0.4→1
    if (current <= SPEED_SLOW) {
      norm = 0;
    } else if (current <= base) {
      norm = 0.4 * (current - SPEED_SLOW) / Math.max(0.01, base - SPEED_SLOW);
    } else {
      norm = 0.4 + 0.6 * Math.min(1, (current - base) / Math.max(0.01, cap - base));
    }
  }

  // How many bars lit (1–5), 0 if stopped
  const lit = wStopped ? 0 : Math.max(1, Math.round(norm * 5));

  spdBars.forEach((bar, i) => {
    bar.className = 'spd-bar';
    if (i >= lit) return; // dim
    const barNum = i + 1;
    if (barNum <= 1)      bar.classList.add('lit-cyan');   // bar 1: dark cyan
    else if (barNum <= 3) bar.classList.add('lit-cyan');   // bars 2–3: cyan
    else if (barNum <= 4) bar.classList.add('lit-yellow'); // bar 4: yellow
    else                  bar.classList.add('lit-pink');   // bar 5: pink
  });
}

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame() {
  // Background always draws at full canvas — no shake offset (avoids edge gaps)
  drawBackground();

  // Camera shake: offset everything EXCEPT background and full-screen overlays
  const shaking = camShakeFrames > 0;
  if (shaking) {
    camShakeFrames--;
    ctx.save();
    ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
  }

  if (gameStarted && !levelPaused && deathState === null) {
    updateWorm();
    updateWormhole();
    updatePixels();
    updateSnapEffects();
    updatePoisonPixels();
    updatePoisonExplosions();
    // Level-gated threats — re-check deathState before each group since any
    // of them can call triggerDeath() which clears wSegs; accessing wSegs[0]
    // after that crashes and halts the animation loop.
    if (deathState === null && (currentLevel === 1 || currentLevel === 5)) { updateRobins(); updateFeeder(); }
    if (deathState === null && alienShips.length > 0) updateShips();
    if (deathState === null && currentLevel >= 2) updateCompetitors();
    if (deathState === null && currentLevel === 3) updateConstellations();
    if (deathState === null && currentLevel >= 4) { updateBlackHole(); updateRedWorms(); }
  }

  // Wormhole exit animation runs even while the level banner is pausing the game,
  // so the worm streams back out during the banner instead of being invisible.
  if (gameStarted && levelPaused && wormhole && wormhole.phase === 'exit') {
    wormhole.angle += 0.04; wormhole.pulse += 0.06; wormhole.blinkT++;
    wormholeExitSegs = Math.min(wSegs.length, wormholeExitSegs + 4);
    if (wormholeExitSegs >= wSegs.length && wormhole.blinkT >= 40) wormhole = null;
  }

  if (deathState !== null) updateDeath();

  if (gameStarted) {
    drawPixels();
    drawWormholeSprite();
    if (currentLevel === 3) { drawConstellations(); drawCnstCreatures(); }
    if (currentLevel >= 4) drawBlackHole();
    if (currentLevel === 1 || currentLevel === 5) drawSeedParticles();
    drawPoisonPixels();
    drawPoisonExplosions();
    drawWorm();
    if (currentLevel === 1 || currentLevel === 5) { drawFeeder(); drawRobins(); drawFeederArrow(); }
    if (alienShips.length > 0) drawShips();
    if (currentLevel >= 2) drawCompetitors();
    if (currentLevel >= 4) drawRedWorms();
    drawSnapEffects();  // always on top
  }

  if (deathState !== null) drawDeath();

  if (shaking) ctx.restore();  // end shake region before full-screen overlays

  // Screen invert flash (black hole absorption)
  if (bhInvertAlpha > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'difference';
    ctx.globalAlpha = bhInvertAlpha;
    ctx.fillStyle   = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // White flash overlay (wormhole transition)
  if (wormholeFlashAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = wormholeFlashAlpha;
    ctx.fillStyle   = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  updateSpeedIndicator();
  updateLevelHUD();
  requestAnimationFrame(frame);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
resize();
initGlowWorms();
initMobileControls();
updateHUD();
requestAnimationFrame(frame);
</script>
</body>
