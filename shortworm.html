<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHORTWORM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0b0c1a;
    overflow: hidden;
    font-family: 'Space Mono', monospace;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    pointer-events: none;
    z-index: 10;
  }

  .hud-panel {
    background: rgba(11, 12, 26, 0.82);
    border: 1px solid rgba(0, 229, 255, 0.28);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 4px;
    padding: 7px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .hud-label {
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a9099;
  }

  #score-value {
    font-size: 22px;
    font-weight: 700;
    color: #f5e642;
    letter-spacing: 0.05em;
    text-shadow: 0 0 8px #f5e642, 0 0 18px rgba(245, 230, 66, 0.5);
    line-height: 1;
  }

  #lives-pips {
    display: flex;
    gap: 5px;
    align-items: center;
    height: 22px;
  }

  .life-pip {
    width: 20px;
    height: 7px;
    background: #ff2d78;
    border-radius: 2px;
    box-shadow: 0 0 6px #ff2d78, 0 0 14px rgba(255, 45, 120, 0.5);
  }

  .life-pip.dead {
    background: rgba(255, 45, 120, 0.18);
    box-shadow: none;
  }

  /* MENU OVERLAY */
  #menu {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 0;
  }

  #menu-title {
    font-size: clamp(48px, 9vw, 96px);
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1;
    margin-bottom: 18px;
  }

  #menu-title .letter {
    display: inline-block;
    animation: titleColorShift 3.5s linear infinite;
  }

  @keyframes titleColorShift {
    0%    { color: #00e5ff; text-shadow: 0 0 18px #00e5ff, 0 0 42px rgba(0,229,255,0.5); }
    17%   { color: #0066ff; text-shadow: 0 0 18px #0066ff, 0 0 42px rgba(0,102,255,0.5); }
    33%   { color: #9900ff; text-shadow: 0 0 18px #9900ff, 0 0 42px rgba(153,0,255,0.5); }
    50%   { color: #ff2d78; text-shadow: 0 0 18px #ff2d78, 0 0 42px rgba(255,45,120,0.5); }
    67%   { color: #ff6b2b; text-shadow: 0 0 18px #ff6b2b, 0 0 42px rgba(255,107,43,0.5); }
    83%   { color: #f5e642; text-shadow: 0 0 18px #f5e642, 0 0 42px rgba(245,230,66,0.5); }
    100%  { color: #00e5ff; text-shadow: 0 0 18px #00e5ff, 0 0 42px rgba(0,229,255,0.5); }
  }

  #menu-subtitle {
    font-size: clamp(9px, 1.4vw, 13px);
    font-weight: 400;
    color: #8a9099;
    letter-spacing: 0.14em;
    text-align: center;
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 44px;
    padding: 0 20px;
  }

  #menu-coin {
    font-size: clamp(13px, 2vw, 17px);
    font-weight: 700;
    color: #ff2d78;
    letter-spacing: 0.18em;
    text-shadow: 0 0 10px #ff2d78, 0 0 24px rgba(255, 45, 120, 0.45);
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  #menu:not(.hidden) { cursor: none; }
  #menu.hidden { display: none; }

  /* COIN CURSOR */
  #coin-cursor {
    position: fixed;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle at 36% 34%, #ffe566, #c49000);
    border: 2px solid #ffcc00;
    box-shadow: 0 0 10px rgba(255,204,0,0.55), 0 2px 5px rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    font-weight: 700;
    color: #6b4400;
    letter-spacing: -0.02em;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
  }
  #coin-cursor.visible { display: flex; }

  /* COIN SLOT */
  #coin-slot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    cursor: none;
  }

  .coin-slot-price {
    font-size: 11px;
    font-weight: 700;
    color: #f5e642;
    letter-spacing: 0.14em;
    text-shadow: 0 0 8px #f5e642;
  }

  #coin-slot-housing {
    width: 120px;
    height: 48px;
    background: #08090f;
    border: 2px solid #22253a;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
    position: relative;
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  #coin-slot-housing:hover {
    border-color: rgba(245,230,66,0.35);
  }

  #coin-slot-gap {
    width: 60px;
    height: 6px;
    background: #020204;
    border-radius: 2px;
    box-shadow: inset 0 1px 5px rgba(0,0,0,0.95),
                0 0 5px rgba(245,230,66,0.08);
    transition: height 0.07s, box-shadow 0.07s;
  }

  #coin-slot-housing.kerchunk {
    border-color: rgba(245,230,66,0.85);
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.8),
                0 0 24px rgba(245,230,66,0.45);
  }

  #coin-slot-housing.kerchunk #coin-slot-gap {
    height: 12px;
    box-shadow: inset 0 1px 5px rgba(0,0,0,0.95),
                0 0 18px rgba(245,230,66,0.65);
  }

  .coin-slot-sublabel {
    font-size: 9px;
    font-weight: 400;
    color: #8a9099;
    letter-spacing: 0.16em;
  }

  /* TOAST */
  #toast {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(11, 12, 26, 0.92);
    border: 1px solid rgba(0, 229, 255, 0.55);
    border-radius: 4px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #00e5ff;
    text-shadow: 0 0 10px #00e5ff, 0 0 22px rgba(0, 229, 255, 0.5);
    box-shadow: 0 0 18px rgba(0, 229, 255, 0.25);
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.12s ease;
    white-space: nowrap;
  }

  #toast.visible { opacity: 1; }

  /* MOBILE CONTROLS */
  #mobile-controls {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    pointer-events: none;
    z-index: 15;
  }

  #mobile-controls.visible { display: block; }

  #joystick-zone {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 115px;
    height: 115px;
    pointer-events: all;
    touch-action: none;
  }

  #joystick-outer {
    width: 115px;
    height: 115px;
    border-radius: 50%;
    border: 2px solid rgba(0, 229, 255, 0.45);
    background: rgba(0, 229, 255, 0.07);
    box-shadow: 0 0 14px rgba(0, 229, 255, 0.22), inset 0 0 14px rgba(0, 229, 255, 0.06);
    position: relative;
  }

  #joystick-knob {
    position: absolute;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(0, 229, 255, 0.28);
    border: 2px solid rgba(0, 229, 255, 0.7);
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  #mobile-buttons {
    position: absolute;
    bottom: 28px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: all;
    touch-action: none;
  }

  .mob-btn {
    width: 58px;
    height: 58px;
    border-radius: 8px;
    border: 2px solid rgba(255, 45, 120, 0.6);
    background: rgba(255, 45, 120, 0.1);
    box-shadow: 0 0 10px rgba(255, 45, 120, 0.3);
    color: #ff2d78;
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.08s, box-shadow 0.08s;
  }

  .mob-btn.active {
    background: rgba(255, 45, 120, 0.35);
    box-shadow: 0 0 18px rgba(255, 45, 120, 0.6);
  }

  /* RESTART BUTTON */
  #restart-btn {
    background: none;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8a9099;
    cursor: pointer;
    align-self: center;
    padding: 6px 10px;
    pointer-events: all;
    transition: color 0.12s, text-shadow 0.12s;
  }
  #restart-btn:hover {
    color: #ff2d78;
    text-shadow: 0 0 8px rgba(255,45,120,0.55);
  }

  /* RESTART CONFIRM */
  #restart-confirm {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(11,12,26,0.88);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 50;
  }
  #restart-confirm.visible { display: flex; }
  #restart-confirm-box {
    background: rgba(11,12,26,0.96);
    border: 1px solid rgba(0,229,255,0.32);
    border-radius: 6px;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    box-shadow: 0 0 30px rgba(0,229,255,0.1);
  }
  #restart-confirm-msg {
    font-size: 11px;
    font-weight: 400;
    color: #e8eaf6;
    letter-spacing: 0.12em;
    text-align: center;
    max-width: 300px;
    line-height: 1.7;
  }
  #restart-confirm-btns { display: flex; gap: 14px; }
  .rconf-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: box-shadow 0.1s, background 0.1s;
  }
  #rconf-cancel {
    background: none;
    border: 1px solid #8a9099;
    color: #8a9099;
  }
  #rconf-cancel:hover { border-color: #e8eaf6; color: #e8eaf6; }
  #rconf-ok {
    background: rgba(255,45,120,0.12);
    border: 1px solid #ff2d78;
    color: #ff2d78;
  }
  #rconf-ok:hover {
    background: rgba(255,45,120,0.26);
    box-shadow: 0 0 14px rgba(255,45,120,0.38);
  }

  /* SPEED INDICATOR */
  #speed-indicator {
    position: fixed;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column-reverse;
    gap: 3px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  #speed-indicator.visible { opacity: 1; }
  .spd-bar {
    width: 22px;
    height: 5px;
    border-radius: 2px;
    background: rgba(0, 229, 255, 0.12);
    border: 1px solid rgba(0, 229, 255, 0.18);
    transition: background 0.1s, box-shadow 0.1s, border-color 0.1s;
  }
  .spd-bar.lit-cyan {
    background: #00e5ff;
    border-color: #00e5ff;
    box-shadow: 0 0 5px #00e5ff, 0 0 10px rgba(0,229,255,0.4);
  }
  .spd-bar.lit-yellow {
    background: #f5e642;
    border-color: #f5e642;
    box-shadow: 0 0 5px #f5e642, 0 0 12px rgba(245,230,66,0.5);
  }
  .spd-bar.lit-pink {
    background: #ff2d78;
    border-color: #ff2d78;
    box-shadow: 0 0 5px #ff2d78, 0 0 14px rgba(255,45,120,0.6);
  }

  /* LEVEL HUD */
  #level-hud {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    background: rgba(11,12,26,0.82);
    border: 1px solid rgba(0,229,255,0.28);
    backdrop-filter: blur(6px);
    border-radius: 4px;
    padding: 7px 14px 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #level-hud.visible { opacity: 1; }
  #level-hud-num {
    font-size: 10px;
    font-weight: 700;
    color: #00e5ff;
    letter-spacing: 0.15em;
  }
  #level-hud-name {
    font-size: 8px;
    font-weight: 400;
    color: #8a9099;
    margin-top: 2px;
  }

  /* SOUND TOGGLE */
  #sound-btn {
    background: none;
    border: none;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    align-self: center;
    padding: 6px 8px;
    pointer-events: all;
    opacity: 0.72;
    transition: opacity 0.12s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
  }
  #sound-btn:hover { opacity: 1; transform: scale(1.15); }

  /* CONTROLS HINT */
  #controls-hint {
    position: fixed;
    bottom: 52px;
    left: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
    z-index: 10;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ctrl-key {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    font-weight: 700;
    color: #00e5ff;
    background: rgba(0, 229, 255, 0.07);
    border: 1px solid rgba(0, 229, 255, 0.20);
    border-radius: 2px;
    padding: 1px 5px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .ctrl-label {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    font-weight: 400;
    color: #3a4050;
    letter-spacing: 0.10em;
  }

  /* LEVEL BANNER */
  #level-banner {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 25;
    pointer-events: none;
    background: rgba(11,12,26,0.18);
  }
  #lbn-sub {
    font-size: 13px;
    font-weight: 400;
    color: #8a9099;
    letter-spacing: 0.26em;
    margin-bottom: 10px;
  }
  #lbn-name {
    font-size: clamp(34px, 6.5vw, 70px);
    font-weight: 700;
    color: #f5e642;
    letter-spacing: 0.08em;
    text-shadow: 0 0 20px #f5e642, 0 0 50px rgba(245,230,66,0.5), 0 0 90px rgba(245,230,66,0.2);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-panel">
    <span class="hud-label">score</span>
    <span id="score-value">000000</span>
  </div>
  <button id="restart-btn">RESTART</button>
  <div class="hud-panel">
    <span class="hud-label">lives</span>
    <div id="lives-pips">
      <div class="life-pip" id="pip1"></div>
      <div class="life-pip" id="pip2"></div>
      <div class="life-pip" id="pip3"></div>
    </div>
  </div>
  <button id="sound-btn" title="Toggle sound">🔇</button>
</div>

<!-- LEVEL HUD -->
<div id="level-hud">
  <div id="level-hud-num">LEVEL 1</div>
  <div id="level-hud-name">DEEP SPACE</div>
</div>

<!-- CONTROLS HINT (always visible) -->
<div id="controls-hint">
  <div class="ctrl-row"><span class="ctrl-key">↑↓←→ WASD</span><span class="ctrl-label">MOVE</span></div>
  <div class="ctrl-row"><span class="ctrl-key">SHIFT / Z</span><span class="ctrl-label">BOOST</span></div>
  <div class="ctrl-row"><span class="ctrl-key">X</span><span class="ctrl-label">SLOW</span></div>
  <div class="ctrl-row"><span class="ctrl-key">SPACE</span><span class="ctrl-label">STOP</span></div>
</div>

<!-- SPEED INDICATOR -->
<div id="speed-indicator">
  <div class="spd-bar" id="spd5"></div>
  <div class="spd-bar" id="spd4"></div>
  <div class="spd-bar" id="spd3"></div>
  <div class="spd-bar" id="spd2"></div>
  <div class="spd-bar" id="spd1"></div>
</div>

<!-- MENU -->
<div id="menu">
  <div id="menu-title">SHORTWORM</div>
  <div id="menu-subtitle">
    COLLECT PIXELS · DODGE ASTRO-ROBINS<br>
    AVOID THE CLAW · GRAB THE FEEDER
  </div>
  <div id="menu-coin">— INSERT COIN —</div>
  <div id="coin-slot-wrap">
    <div class="coin-slot-price">25¢</div>
    <div id="coin-slot-housing">
      <div id="coin-slot-gap"></div>
    </div>
    <div class="coin-slot-sublabel">INSERT COIN</div>
  </div>
</div>

<!-- COIN CURSOR -->
<div id="coin-cursor">25¢</div>

<!-- LEVEL BANNER -->
<div id="level-banner">
  <div id="lbn-sub">LEVEL 1</div>
  <div id="lbn-name">DEEP SPACE</div>
</div>

<!-- RESTART CONFIRM -->
<div id="restart-confirm">
  <div id="restart-confirm-box">
    <div id="restart-confirm-msg">RESTART GAME?<br>YOUR PROGRESS WILL BE LOST.</div>
    <div id="restart-confirm-btns">
      <button class="rconf-btn" id="rconf-cancel">CANCEL</button>
      <button class="rconf-btn" id="rconf-ok">CONFIRM</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MOBILE CONTROLS -->
<div id="mobile-controls">
  <div id="joystick-zone">
    <div id="joystick-outer">
      <div id="joystick-knob"></div>
    </div>
  </div>
  <div id="mobile-buttons">
    <div class="mob-btn" id="btn-boost" title="Boost">▲</div>
    <div class="mob-btn" id="btn-slow"  title="Slow">▼</div>
    <div class="mob-btn" id="btn-stop"  title="Stop">■</div>
  </div>
</div>

<script>
'use strict';

// ─── PALETTE ─────────────────────────────────────────────────────────────────
const BG     = '#0b0c1a';
const YELLOW = '#f5e642';
const CYAN   = '#00e5ff';
const ORANGE = '#ff6b2b';
const PINK   = '#ff2d78';
const TEXT   = '#e8eaf6';
const MUTED  = '#8a9099';
const ACCENT_COLORS = [YELLOW, CYAN, ORANGE, PINK];

// Worm gradient stops: head (index 0) → tail
const WORM_GRADIENT = [
  { r: 0,   g: 229, b: 255 }, // cyan    #00e5ff
  { r: 0,   g: 102, b: 255 }, // blue    #0066ff
  { r: 153, g: 0,   b: 255 }, // purple  #9900ff
  { r: 255, g: 45,  b: 120 }, // pink    #ff2d78
  { r: 255, g: 107, b: 43  }, // orange  #ff6b2b
  { r: 245, g: 230, b: 66  }, // yellow  #f5e642
];

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
}
window.addEventListener('resize', resize);

// ─── UTILITIES ───────────────────────────────────────────────────────────────
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = arr   => arr[Math.floor(Math.random() * arr.length)];

// Wrap a raw coord into [0, W) or [0, H) for display / collision
const wrapX = x => ((x % W) + W) % W;
const wrapY = y => ((y % H) + H) % H;

// Shortest-path delta on a torus (a→b)
function torusDelta(ax, ay, bx, by) {
  let dx = bx - ax, dy = by - ay;
  if (dx >  W / 2) dx -= W;
  if (dx < -W / 2) dx += W;
  if (dy >  H / 2) dy -= H;
  if (dy < -H / 2) dy += H;
  return { dx, dy };
}

function torusDist(ax, ay, bx, by) {
  const { dx, dy } = torusDelta(ax, ay, bx, by);
  return Math.hypot(dx, dy);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

// Sample the worm gradient. t=0 → head color, t=1 → tail color.
function wormColor(t) {
  const stops = WORM_GRADIENT;
  const scaled = t * (stops.length - 1);
  const lo = Math.floor(scaled);
  const hi = Math.min(lo + 1, stops.length - 1);
  const f  = scaled - lo;
  const a  = stops[lo], b2 = stops[hi];
  const r  = Math.round(a.r + (b2.r - a.r) * f);
  const g  = Math.round(a.g + (b2.g - a.g) * f);
  const bv = Math.round(a.b + (b2.b - a.b) * f);
  return { r, g, b: bv, css: `rgb(${r},${g},${bv})`, hex: `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bv.toString(16).padStart(2,'0')}` };
}

// ─── STARS ───────────────────────────────────────────────────────────────────
let stars = [];

function initStars() {
  const count = Math.round((W * H) / 4200);
  stars = Array.from({ length: count }, () => ({
    x:     rand(0, W),
    y:     rand(0, H),
    r:     rand(0.2, 1.7),
    phase: rand(0, Math.PI * 2),
    speed: rand(0.005, 0.023),
  }));
}

function drawStars() {
  for (const s of stars) {
    s.phase += s.speed;
    const alpha = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232, 234, 246, ${alpha})`;
    ctx.fill();
  }
}

// ─── AMBIENT GLOW WORMS ──────────────────────────────────────────────────────
let glowWorms = [];

function makeGlowWorm(startOffscreen = false) {
  const color  = pick(ACCENT_COLORS);
  const length = rand(55, 185);
  const speed  = rand(0.35, 1.3);
  const y      = rand(0, H);
  const x      = startOffscreen ? -length - rand(0, W * 0.5) : rand(-length, W + length);
  return {
    x, y, length, speed, color,
    alpha:     rand(0.12, 0.34),
    waveOff:   rand(0, Math.PI * 2),
    waveAmp:   rand(6, 22),
    waveFreq:  rand(0.012, 0.032),
    waveSpeed: rand(0.008, 0.022),
    rgb: hexToRgb(color),
  };
}

function initGlowWorms() {
  glowWorms = Array.from({ length: 7 }, () => makeGlowWorm(false));
}

function drawGlowWorms() {
  for (const w of glowWorms) {
    w.x += w.speed;
    w.waveOff += w.waveSpeed;

    const cy = w.y + Math.sin(w.waveOff) * w.waveAmp;
    const tx = w.x;
    const hx = w.x + w.length;

    const steps = Math.ceil(w.length / 4);
    for (let i = 0; i < steps; i++) {
      const t    = i / (steps - 1);
      const segX = tx + t * w.length;
      const segY = cy + Math.sin(w.waveOff + t * 1.4) * w.waveAmp * 0.25;
      const segAlpha  = w.alpha * t;
      const blur = 6 + t * 3.6;

      ctx.save();
      ctx.globalAlpha = segAlpha;
      ctx.strokeStyle = `rgba(${w.rgb}, 1)`;
      ctx.shadowColor = w.color;
      ctx.shadowBlur  = blur;
      ctx.lineWidth   = 2;
      ctx.lineCap     = 'round';

      if (i < steps - 1) {
        const t2 = (i + 1) / (steps - 1);
        const nx = tx + t2 * w.length;
        const ny = cy + Math.sin(w.waveOff + t2 * 1.4) * w.waveAmp * 0.25;
        ctx.beginPath();
        ctx.moveTo(segX, segY);
        ctx.lineTo(nx, ny);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Leading-tip glow burst
    {
      const tipX = hx;
      const tipY = cy + Math.sin(w.waveOff + 1.4) * w.waveAmp * 0.25;
      ctx.save();
      ctx.globalAlpha = w.alpha * 0.7;
      ctx.shadowColor = w.color;
      ctx.shadowBlur  = 18;
      ctx.fillStyle   = w.color;
      ctx.beginPath();
      ctx.arc(tipX, tipY, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    if (w.x > W + 20) {
      Object.assign(w, makeGlowWorm(true));
      w.y = rand(0, H);
    }
  }
}

// ─── PLAYER WORM ─────────────────────────────────────────────────────────────
const SEG_RADIUS  = 8;
const SEG_SPACING = 16;
const SPEED_SLOW        = 1.6;   // slow-crawl speed, constant across levels
const LERP_DIR          = 0.09;
const START_SEGS        = 12;
// Level-indexed base and boost cap speeds (index 0 = unused, 1–5 = levels)
const SPEED_BASE_LEVELS  = [0, 2.8, 3.6, 4.2, 4.8, 5.4];
const SPEED_BOOST_LEVELS = [0, 5.0, 6.2, 7.2, 8.0, 9.0];
function levelBaseSpeed()  { return SPEED_BASE_LEVELS[currentLevel]  ?? 3.5; }
function levelBoostCap()   { return SPEED_BOOST_LEVELS[currentLevel] ?? 5.5; }

let wSegs          = [];   // [{x, y}, ...]  index 0 = head
let wDir           = { x: 1, y: 0 };
let wTarget        = { x: 1, y: 0 };
let wStopped       = false;
let wBoosting      = false;
let wSlowing       = false;
let wGrow          = 0;
let wInvincible    = 0;
let wFrame         = 0;     // frame counter for flash timing
let wBoostMomentum = 0;     // extra speed built while boosting (0 → boostCap-base)
let wSpeedBurst    = 0;     // additive bonus from pixel collection
let wSpeedBurstT   = 0;     // frames remaining on burst

function initWorm() {
  wSegs = [];
  const cx = W / 2, cy = H / 2;
  for (let i = 0; i < START_SEGS; i++) {
    wSegs.push({ x: cx - i * SEG_SPACING, y: cy });
  }
  wDir    = { x: 1, y: 0 };
  wTarget = { x: 1, y: 0 };
  wStopped    = false;
  wBoosting   = false;
  wSlowing    = false;
  wGrow       = 0;
  wInvincible = 0;
  wFrame      = 0;
  wBoostMomentum = 0;
  wSpeedBurst    = 0;
  wSpeedBurstT   = 0;
}

function updateWorm() {
  if (!gameStarted) return;
  wFrame++;

  // Lerp direction toward target
  wDir.x += (wTarget.x - wDir.x) * LERP_DIR;
  wDir.y += (wTarget.y - wDir.y) * LERP_DIR;
  // Normalize
  const dlen = Math.hypot(wDir.x, wDir.y);
  if (dlen > 0) { wDir.x /= dlen; wDir.y /= dlen; }

  // Momentum: ramp up while boosting, decay when not
  const boostMax = levelBoostCap() - levelBaseSpeed();
  if (wBoosting && !wStopped) {
    wBoostMomentum = Math.min(boostMax, wBoostMomentum + 0.15);
  } else {
    wBoostMomentum = Math.max(0, wBoostMomentum - boostMax / 30);
  }
  // Burst countdown
  if (wSpeedBurstT > 0) { wSpeedBurstT--; }
  else                   { wSpeedBurst = 0; }

  if (!wStopped) {
    let speed;
    if (bhPulling) {
      speed = bhPullSpd;
    } else if (wormhole && wormhole.phase === 'eating') {
      speed = wormholeEnterSpd;
    } else if (wSlowing) {
      speed = SPEED_SLOW;
    } else {
      const base  = levelBaseSpeed();
      const boost = Math.min(wBoostMomentum, boostMax);
      const burst = Math.min(wSpeedBurst, base);
      speed = Math.min(Math.max(levelBoostCap(), base * 2), base + boost + burst);
    }
    const head  = wSegs[0];

    // Move head — raw coords, no clamping; wrap applied at draw time
    wSegs[0] = {
      x: head.x + wDir.x * speed,
      y: head.y + wDir.y * speed,
    };

    // Chain: each subsequent segment follows the one ahead
    for (let i = 1; i < wSegs.length; i++) {
      const prev = wSegs[i - 1];
      const cur  = wSegs[i];
      const dx   = cur.x - prev.x;
      const dy   = cur.y - prev.y;
      const dist = Math.hypot(dx, dy);
      if (dist > SEG_SPACING) {
        const over = dist - SEG_SPACING;
        const nx2  = cur.x - (dx / dist) * over;
        const ny2  = cur.y - (dy / dist) * over;
        wSegs[i]   = { x: nx2, y: ny2 };
      }
    }
  }

  // Grow: append segment at tail each frame wGrow > 0
  if (wGrow > 0) {
    if (wGrow % 6 === 0) sfx.wormGrow();  // blip once per 6-seg batch
    wSegs.push({ ...wSegs[wSegs.length - 1] });
    wGrow--;
  }

  // Invincibility countdown
  if (wInvincible > 0) wInvincible--;
}

function drawWorm() {
  if (!gameStarted) return;

  // Flash when invincible
  if (wInvincible > 0) {
    const flashOn = Math.floor(wFrame / 8) % 2 === 0;
    ctx.globalAlpha = flashOn ? 1.0 : 0.4;
  }

  const n = wSegs.length;

  // Segment streaming: during wormhole/black hole enter, show only a subset
  let segsToShow = n;
  if (bhPulling) {
    segsToShow = Math.max(0, n - bhSegsEaten);
  } else if (wormhole) {
    if (wormhole.phase === 'eating') segsToShow = Math.max(0, n - wormholeSegsEaten);
    if (wormhole.phase === 'exit')   segsToShow = Math.min(n, wormholeExitSegs);
  }
  if (segsToShow === 0) { ctx.globalAlpha = 1; return; }

  // Glow attraction radius — faint radial gradient around head (display pos)
  const glowR   = Math.min(105, 16 + n * 2.2);
  const headDX  = wrapX(wSegs[0].x);
  const headDY  = wrapY(wSegs[0].y);
  const headColor = wormColor(0);
  const grad = ctx.createRadialGradient(headDX, headDY, 0, headDX, headDY, glowR);
  grad.addColorStop(0,   `rgba(${headColor.r},${headColor.g},${headColor.b},0.09)`);
  grad.addColorStop(0.5, `rgba(${headColor.r},${headColor.g},${headColor.b},0.03)`);
  grad.addColorStop(1,   `rgba(${headColor.r},${headColor.g},${headColor.b},0)`);
  ctx.save();
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(headDX, headDY, glowR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Draw segments tail → head so head renders on top
  // Apply modulo wrap to raw coords for display only
  for (let i = segsToShow - 1; i >= 0; i--) {
    const seg = wSegs[i];
    const sx  = wrapX(seg.x);
    const sy  = wrapY(seg.y);
    const t   = i / Math.max(n - 1, 1);   // 0=head, 1=tail
    const col = wormColor(t);
    const isHead = (i === 0);
    const r      = isHead ? 11 : SEG_RADIUS;
    const blur   = isHead ? 26 : 18;

    ctx.save();
    ctx.shadowColor = col.css;
    ctx.shadowBlur  = blur;
    ctx.fillStyle   = col.css;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
    // Second pass for extra glow on head
    if (isHead) {
      ctx.shadowBlur  = 40;
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.arc(sx, sy, r + 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Reset alpha
  ctx.globalAlpha = 1;
}

// ─── COLLECTIBLE PIXELS ──────────────────────────────────────────────────────
const PIXEL_TYPES = [
  { name: 'common', r: 4,  color: '#00e5ff', pts: 1,   weight: 58, label: null    },
  { name: 'byte',   r: 7,  color: '#f5e642', pts: 5,   weight: 25, label: 'BYTE'  },
  { name: 'mega',   r: 11, color: '#ff6b2b', pts: 25,  weight: 11, label: 'MEGA'  },
  { name: 'giga',   r: 16, color: '#ff2d78', pts: 100, weight: 6,  label: 'GIGA'  },
];
const PIXEL_TOTAL_WEIGHT = PIXEL_TYPES.reduce((s, t) => s + t.weight, 0);
const PIXEL_POOL_CAP  = 35;
const PIXEL_START_CNT = 22;
const PIXEL_MARGIN    = 45;
const PIXEL_ATTRACT   = 2.4;
const PIXEL_PULSE_SPD = 0.065;

let pixels = [];

function pickPixelType() {
  let roll = Math.random() * PIXEL_TOTAL_WEIGHT;
  for (const t of PIXEL_TYPES) {
    roll -= t.weight;
    if (roll <= 0) return t;
  }
  return PIXEL_TYPES[0];
}

function spawnPixel() {
  if (pixels.length >= PIXEL_POOL_CAP) return;
  const type = pickPixelType();
  pixels.push({
    x:     rand(PIXEL_MARGIN, W - PIXEL_MARGIN),
    y:     rand(PIXEL_MARGIN, H - PIXEL_MARGIN),
    type,
    pulse: rand(0, Math.PI * 2),
  });
}

function initPixels() {
  pixels = [];
  for (let i = 0; i < PIXEL_START_CNT; i++) spawnPixel();
}

function updatePixels() {
  if (!gameStarted || wSegs.length === 0) return;

  // Use wrapped (display) head position for all pixel interactions
  const hx    = wrapX(wSegs[0].x);
  const hy    = wrapY(wSegs[0].y);
  const n     = wSegs.length;
  const glowR = Math.min(105, 16 + n * 2.2);

  for (let i = pixels.length - 1; i >= 0; i--) {
    const p    = pixels[i];
    p.pulse   += PIXEL_PULSE_SPD;

    // Toroidal shortest-path vector from pixel to head
    const { dx, dy } = torusDelta(p.x, p.y, hx, hy);
    const dist = Math.hypot(dx, dy);

    // Magnetic attraction toward head
    if (dist > 1 && dist < glowR) {
      p.x += (dx / dist) * PIXEL_ATTRACT;
      p.y += (dy / dist) * PIXEL_ATTRACT;
      // Keep pixel within viewport bounds
      p.x = ((p.x % W) + W) % W;
      p.y = ((p.y % H) + H) % H;
    }

    // Collection check (toroidal)
    if (dist < SEG_RADIUS + p.type.r) {
      score += Math.round(p.type.pts * cnstScoreMult);
      wGrow += Math.ceil(p.type.pts / 6);
      updateHUD();

      if (p.type.name === 'common' || p.type.name === 'byte') sfx.pixelCommon();
      else sfx.pixelBig();

      if (p.type.name === 'giga') showToast('GIGA PIXEL!');
      checkLevelThreshold();

      // Speed burst on collection
      if      (p.type.name === 'giga')   { wSpeedBurst = Math.max(wSpeedBurst, 1.2); wSpeedBurstT = 50; }
      else if (p.type.name === 'mega')   { wSpeedBurst = Math.max(wSpeedBurst, 0.8); wSpeedBurstT = Math.max(wSpeedBurstT, 35); }
      else if (p.type.name === 'byte')   { wSpeedBurst = Math.max(wSpeedBurst, 0.5); wSpeedBurstT = Math.max(wSpeedBurstT, 25); }
      else                               { wSpeedBurst = Math.max(wSpeedBurst, 0.3); wSpeedBurstT = Math.max(wSpeedBurstT, 20); }

      pixels.splice(i, 1);
      spawnPixel();
    }
  }
}

function drawPixels() {
  if (!gameStarted) return;

  for (const p of pixels) {
    const { type } = p;
    const hw  = type.r;                                           // half-width of square
    const osc = Math.sin(p.pulse);
    const blur = (type.r * 1.8) + osc * 10;                      // pulsing glow

    ctx.save();
    ctx.shadowColor = type.color;
    ctx.shadowBlur  = blur;
    ctx.fillStyle   = type.color;
    ctx.fillRect(p.x - hw, p.y - hw, hw * 2, hw * 2);
    ctx.restore();

    // Label for byte / mega / giga
    if (type.label) {
      ctx.save();
      ctx.font         = '700 7px "Space Mono", monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillStyle    = type.color;
      ctx.shadowColor  = type.color;
      ctx.shadowBlur   = 6;
      ctx.globalAlpha  = 0.85;
      ctx.fillText(type.label, p.x, p.y - hw - 3);
      ctx.restore();
    }
  }
}

// ─── ASTRO-ROBINS ────────────────────────────────────────────────────────────
const ROBIN_MARGIN       = 60;
const ROBIN_COLLISION_R  = 12;
const ROBIN_START_COUNT  = 3;
const ROBIN_MAX          = 8;
const ROBIN_SPAWN_EVERY  = 720;   // frames between auto-spawns

let robins          = [];
let robinSpawnTimer = 0;

// placeholder — feeder system sets this later
let feederPos = null;

// ── rounded-rect path helper ──────────────────────────────────────────────────
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

// ── draw a single robin (facing-right canonical, flip if facingLeft) ──────────
function drawRobin(x, y, facingLeft, sc = 1) {
  ctx.save();
  ctx.translate(x, y);
  if (sc !== 1) ctx.scale(sc, sc);
  if (facingLeft) ctx.scale(-1, 1);

  // — TAIL (behind body, draw first) —
  ctx.save();
  ctx.fillStyle = '#993311';
  ctx.beginPath();
  ctx.moveTo(-14, -5);
  ctx.lineTo(-23, -9);
  ctx.lineTo(-26,  0);
  ctx.lineTo(-23,  7);
  ctx.lineTo(-14,  5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // — BODY (rounded rect 28×20) —
  ctx.save();
  ctx.fillStyle = '#cc4422';
  roundRectPath(-14, -10, 28, 20, 5);
  ctx.fill();
  ctx.restore();

  // — BREAST (rounded ellipse on front) —
  ctx.save();
  ctx.fillStyle = '#ee6633';
  ctx.beginPath();
  ctx.ellipse(3, 2, 8, 7, 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // — HEAD (circle top-forward) —
  const hx = 6, hy = -16;
  ctx.save();
  ctx.fillStyle = '#cc4422';
  ctx.beginPath();
  ctx.arc(hx, hy, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // — BEAK (triangle pointing right) —
  ctx.save();
  ctx.fillStyle = '#ffaa44';
  ctx.beginPath();
  ctx.moveTo(hx + 8,  hy - 1);
  ctx.lineTo(hx + 15, hy + 1);
  ctx.lineTo(hx + 8,  hy + 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // — EYE —
  ctx.save();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(hx + 3, hy - 2, 2.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0b0c1a';
  ctx.beginPath();
  ctx.arc(hx + 3.7, hy - 2, 1.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // — FEET (two legs with three-toe forks) —
  ctx.save();
  ctx.strokeStyle = '#aa6622';
  ctx.lineWidth   = 1.5;
  ctx.lineCap     = 'round';
  const feet = [[-5, 10], [4, 10]];
  for (const [fx, fy] of feet) {
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy + 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, fy + 7); ctx.lineTo(fx - 4, fy + 11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, fy + 7); ctx.lineTo(fx,     fy + 12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, fy + 7); ctx.lineTo(fx + 4, fy + 11); ctx.stroke();
  }
  ctx.restore();

  // — SPACE HELMET (dome over head) —
  const domeR = 12;
  ctx.save();
  ctx.shadowColor = CYAN;
  ctx.shadowBlur  = 9;
  // faint fill
  ctx.fillStyle = 'rgba(0,229,255,0.07)';
  ctx.beginPath();
  ctx.arc(hx, hy, domeR, 0, Math.PI * 2);
  ctx.fill();
  // outline
  ctx.strokeStyle = 'rgba(0,229,255,0.55)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.arc(hx, hy, domeR, 0, Math.PI * 2);
  ctx.stroke();
  // glint arc upper-left
  ctx.shadowBlur   = 0;
  ctx.strokeStyle  = 'rgba(255,255,255,0.55)';
  ctx.lineWidth    = 1.5;
  ctx.beginPath();
  ctx.arc(hx - 3, hy - 3, domeR * 0.52, Math.PI * 1.08, Math.PI * 1.52);
  ctx.stroke();
  ctx.restore();

  ctx.restore(); // undo translate/scale
}

// ── robin factory ─────────────────────────────────────────────────────────────
function randomRobinDest() {
  return { x: rand(ROBIN_MARGIN, W - ROBIN_MARGIN),
           y: rand(ROBIN_MARGIN, H - ROBIN_MARGIN) };
}

function edgeSpawnPos() {
  const edge = Math.floor(rand(0, 4));
  if (edge === 0) return { x: rand(0, W), y: -28 };
  if (edge === 1) return { x: rand(0, W), y: H + 28 };
  if (edge === 2) return { x: -28,        y: rand(0, H) };
                  return { x: W + 28,     y: rand(0, H) };
}

function makeRobin(fromEdge = false) {
  const start = fromEdge ? edgeSpawnPos() : randomRobinDest();
  const dest  = randomRobinDest();
  return {
    x: start.x,  y: start.y,
    ax: start.x, ay: start.y,   // hop start
    bx: dest.x,  by: dest.y,    // hop end
    hopDur:  Math.floor(rand(42, 68)),
    hopT:    0,
    arcH:    rand(18, 46),
    facingLeft: dest.x < start.x,
    distracted: false,
    distractT:  0,
    bounceT:    0,
  };
}

function robinNewHop(r) {
  r.ax = r.x;  r.ay = r.y;
  let dest;
  // Priority 1: nearest PHASE 1 (safe) poison pixel within 350px
  // Robins avoid Phase 2 pixels — they know better
  let nearPP = null, nearPPDist = 350;
  for (const pp of poisonPixels) {
    if (pp.age >= POISON_PHASE1) continue;   // skip dangerous phase 2 pixels
    const d = torusDist(r.x, r.y, wrapX(pp.x), wrapY(pp.y));
    if (d < nearPPDist) { nearPPDist = d; nearPP = pp; }
  }
  if (nearPP) {
    dest = { x: wrapX(nearPP.x) + rand(-18, 18), y: wrapY(nearPP.y) + rand(-18, 18) };
  } else if (r.distracted && feederPos) {
    dest = { x: feederPos.x + rand(-25, 25), y: feederPos.y + rand(-25, 25) };
  } else {
    dest = randomRobinDest();
  }
  r.bx = dest.x;  r.by = dest.y;
  r.hopDur    = Math.floor(rand(42, 68));
  r.hopT      = 0;
  r.arcH      = rand(18, 46);
  r.facingLeft = r.bx < r.ax;
}

// ── robin update ──────────────────────────────────────────────────────────────
function initRobins() {
  robins          = [];
  robinSpawnTimer = 0;
  for (let i = 0; i < ROBIN_START_COUNT; i++) robins.push(makeRobin(false));
}

function updateRobins() {
  if (!gameStarted) return;

  // Auto-spawn up to cap
  robinSpawnTimer++;
  if (robinSpawnTimer >= ROBIN_SPAWN_EVERY && robins.length < ROBIN_MAX) {
    robins.push(makeRobin(true));
    robinSpawnTimer = 0;
  }

  for (const r of robins) {
    // Distraction countdown
    if (r.distracted && --r.distractT <= 0) r.distracted = false;
    // Bounce countdown
    if (r.bounceT > 0) r.bounceT--;

    // Advance parabolic hop
    r.hopT++;
    const progress = r.hopT / r.hopDur;
    r.x = r.ax + (r.bx - r.ax) * progress;
    r.y = r.ay + (r.by - r.ay) * progress
          - Math.sin(progress * Math.PI) * r.arcH;
    r.facingLeft = r.bx < r.ax;

    if (r.hopT >= r.hopDur) {
      r.x = r.bx;  r.y = r.by;
      robinNewHop(r);
    }

    // Robin eats a Phase 1 poison pixel → happy bounce
    // Phase 2 pixels are avoided (too dangerous)
    for (let pi = poisonPixels.length - 1; pi >= 0; pi--) {
      const pp = poisonPixels[pi];
      if (pp.age >= POISON_PHASE1) continue;  // won't touch phase 2
      if (torusDist(r.x, r.y, wrapX(pp.x), wrapY(pp.y)) < POISON_EAT_R) {
        poisonPixels.splice(pi, 1);
        r.bounceT = 12;
        robinNewHop(r);
        break;
      }
    }
  }

  // Collision with worm segments
  if (wInvincible > 0 || wSegs.length === 0) return;

  outer:
  for (const r of robins) {
    if (r.distracted) continue;
    for (let si = 0; si < wSegs.length; si++) {
      const sx = wrapX(wSegs[si].x), sy = wrapY(wSegs[si].y);
      if (torusDist(r.x, r.y, sx, sy) < SEG_RADIUS + ROBIN_COLLISION_R) {
        wormSnapAt(si, r);
        continue outer;
      }
    }
  }
}

function drawRobins() {
  if (!gameStarted) return;
  for (const r of robins) {
    const sc = r.bounceT > 0 ? (1 + 0.3 * Math.sin((1 - r.bounceT / 12) * Math.PI)) : 1;
    drawRobin(r.x, r.y, r.facingLeft, sc);
  }
}

// ─── BIRD FEEDER ─────────────────────────────────────────────────────────────
const FEEDER_W         = 22;
const FEEDER_H         = 28;
const FEEDER_COLLECT_R = 20;
const FEEDER_SPAWN_INT = 380;   // frames between random respawns
const FEEDER_FIRST_F   = 300;   // forced first spawn at ~5s
const FEEDER_DISTRACT  = 280;   // frames robins stay distracted

let feeder           = null;   // { x, y, pulse } or null
let feederSpawnTimer = 0;
let feederFirstDone  = false;  // true once guaranteed first spawn has fired
let feederIntroShown = false;  // one-time intro toast per game
let feederArrow      = null;   // { x, y, age } arrow pointing to feeder
let seedParticles    = [];     // { x, y, vx, vy, life }

function spawnFeeder() {
  if (!wSegs.length) return;
  const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
  let x, y, tries = 0;
  do {
    x = rand(80, W - 80);
    y = rand(80, H - 80);
    tries++;
  } while (torusDist(x, y, hx, hy) < 140 && tries < 40);
  feeder    = { x, y, pulse: 0 };
  feederPos = { x, y };
  if (!feederIntroShown) {
    feederIntroShown = true;
    showToast('SEED POUCH — grab it to distract the robins!', 3500);
    feederArrow = { x, y, age: 0 };
  }
}

function collectFeeder() {
  if (!feeder) return;
  const { x: fx, y: fy } = feeder;
  feeder = null;
  feederSpawnTimer = 0;
  feederArrow      = null;
  // Scatter seed particles
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = rand(1.5, 4.5);
    seedParticles.push({
      x: fx, y: fy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: Math.ceil(rand(180, 280)),
    });
  }
  feederPos = { x: fx, y: fy };
  // Distract all active robins toward seed position
  for (const r of robins) {
    r.distracted = true;
    r.distractT  = FEEDER_DISTRACT;
    robinNewHop(r);
  }
  score += 10; updateHUD();
  showToast('BIRD FEEDER!');
  sfx.pixelBig();
}

function updateFeeder() {
  if (!gameStarted || levelPaused) return;
  // Spawn logic: forced first at FEEDER_FIRST_F frames, then random every FEEDER_SPAWN_INT
  if (!feeder) {
    feederSpawnTimer++;
    const threshold = feederFirstDone ? FEEDER_SPAWN_INT : FEEDER_FIRST_F;
    if (feederSpawnTimer >= threshold) {
      feederFirstDone  = true;
      feederSpawnTimer = 0;
      spawnFeeder();
    }
  }
  if (feeder) {
    feeder.pulse += 0.07;
    // Collection check
    const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
    if (torusDist(hx, hy, feeder.x, feeder.y) < FEEDER_COLLECT_R) collectFeeder();
  }
  // Seed particles
  for (let i = seedParticles.length - 1; i >= 0; i--) {
    const p = seedParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) { seedParticles.splice(i, 1); continue; }
  }
  // Keep feederPos pointing to seed centroid while particles exist
  if (!feeder && seedParticles.length > 0) {
    let sx = 0, sy = 0;
    for (const p of seedParticles) { sx += p.x; sy += p.y; }
    feederPos = { x: sx / seedParticles.length, y: sy / seedParticles.length };
  } else if (!feeder && seedParticles.length === 0) {
    feederPos = null;
  }
  // Arrow lifetime
  if (feederArrow) {
    feederArrow.age++;
    if (!feeder || feederArrow.age > 240) feederArrow = null;
  }
}

function drawFeeder() {
  if (!gameStarted || !feeder) return;
  const { x, y, pulse } = feeder;
  const sc = 0.9 + Math.sin(pulse) * 0.10;  // 0.9–1.0 breathe
  const fw = FEEDER_W * sc;
  const fh = FEEDER_H * sc;

  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = '#f5e642';
  ctx.shadowBlur  = 22;

  // Hook — upside-down V at top
  ctx.strokeStyle = '#aa7733';
  ctx.lineWidth   = 2.2;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(-6 * sc,  -fh / 2);
  ctx.lineTo(0,         -fh / 2 - 8 * sc);
  ctx.lineTo(6 * sc,   -fh / 2);
  ctx.stroke();

  // Body rounded rect
  ctx.fillStyle = '#aa7733';
  roundRectPath(-fw / 2, -fh / 2, fw, fh, 4 * sc);
  ctx.fill();

  // Three bright seed dots
  ctx.shadowBlur  = 5;
  ctx.fillStyle   = '#f5e642';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc((-6 + i * 6) * sc, 3 * sc, 2.8 * sc, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawSeedParticles() {
  if (!gameStarted || seedParticles.length === 0) return;
  for (const p of seedParticles) {
    const alpha = Math.min(1, p.life / 60);
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle   = '#f5e642';
    ctx.shadowColor = '#f5e642';
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.arc(wrapX(p.x), wrapY(p.y), 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawFeederArrow() {
  if (!feeder || !feederArrow) return;
  const { age, x: tx, y: ty } = feederArrow;
  const fade = age < 180 ? 1 : Math.max(0, 1 - (age - 180) / 60);
  if (fade <= 0) return;

  // Direction from viewport center toward feeder
  const cx2 = W / 2, cy2 = H / 2;
  const dx = tx - cx2, dy = ty - cy2;
  const dl = Math.hypot(dx, dy) || 1;
  // Don't draw if feeder is very close to center
  if (dl < 80) return;
  const ndx = dx / dl, ndy = dy / dl;

  // Find closest viewport edge intersection (with 50px margin)
  let tMin = Infinity;
  if (Math.abs(ndx) > 0.001) tMin = Math.min(tMin, ndx > 0 ? (W - 50 - cx2) / ndx : (50 - cx2) / ndx);
  if (Math.abs(ndy) > 0.001) tMin = Math.min(tMin, ndy > 0 ? (H - 50 - cy2) / ndy : (50 - cy2) / ndy);
  tMin = Math.min(tMin, dl - 60);  // don't overshoot feeder
  if (tMin <= 0) return;

  const ax = cx2 + ndx * tMin;
  const ay = cy2 + ndy * tMin;
  const pulse = 0.55 + Math.sin(age * 0.16) * 0.35;

  ctx.save();
  ctx.globalAlpha = fade * pulse;
  ctx.translate(ax, ay);
  ctx.rotate(Math.atan2(ndy, ndx));
  ctx.strokeStyle = '#00e5ff';
  ctx.fillStyle   = '#00e5ff';
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur  = 12;
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  // Shaft
  ctx.beginPath(); ctx.moveTo(-22, 0); ctx.lineTo(4, 0); ctx.stroke();
  // Head
  ctx.beginPath();
  ctx.moveTo(16, 0); ctx.lineTo(4, -7); ctx.lineTo(4, 7);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── SNAP EFFECTS & POISON PIXELS ────────────────────────────────────────────
const POISON_CAP       = 8;
const POISON_PHASE1    = 140;  // age at which warning → danger
const POISON_PHASE2    = 280;  // age at which explosion fires
const POISON_EAT_R     = 14;   // robin/competitor eat radius (phase 1 only)
const POISON_HIT_R     = 11;   // player collision radius
const POISON_EXPLODE_R = 55;   // proximity blast radius

let poisonPixels      = [];    // { x, y, vx, vy, age, pulse }
let poisonExplosions  = [];    // { x, y, t, particles, flashT }
let snapEffects       = [];    // { x, y, t, zoneColor, sparks, arcs, tailSegs }
let camShakeFrames = 0;

/* ── snap trigger ── */
function triggerSnapEffect(bx, by, zoneColor, detachedSegs) {
  const sparks = [];
  for (let i = 0; i < 9; i++) {
    const angle = (i / 9) * Math.PI * 2 + rand(-0.4, 0.4);
    const spd   = rand(2.5, 6.0);
    const col   = wormColor(i / 9);
    sparks.push({ x: bx, y: by, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                  life: Math.ceil(rand(14, 24)), col });
  }
  // 2-3 jagged electric arc lines
  const arcs = [];
  for (let a = 0; a < 3; a++) {
    const angle = rand(0, Math.PI * 2);
    const len   = rand(22, 42);
    const pts   = [{ x: bx, y: by }];
    let cx2 = bx, cy2 = by;
    for (let s = 0; s < 4; s++) {
      cx2 += Math.cos(angle) * len / 4 + rand(-10, 10);
      cy2 += Math.sin(angle) * len / 4 + rand(-10, 10);
      pts.push({ x: cx2, y: cy2 });
    }
    arcs.push({ pts });
  }
  // Dissolving tail seg positions (cap at 24 for perf)
  const tailSegs = detachedSegs.slice(0, 24).map(seg => ({
    x: wrapX(seg.x), y: wrapY(seg.y), alpha: 1.0,
  }));
  snapEffects.push({ x: bx, y: by, t: 0, zoneColor, sparks, arcs, tailSegs });
}

/* ── worm break function (called by robin/claw/explosion collision) ──
   noNewPoison=true: don't spawn poison pixels (prevents chain reactions) */
function wormSnapAt(segIndex, hitRobin, noNewPoison = false) {
  if (wSegs.length === 0) return;
  const n = wSegs.length;
  // Keep at least 1 segment (the head)
  const keepTo = Math.max(1, segIndex);
  const bSeg   = wSegs[Math.min(keepTo - 1, wSegs.length - 1)];
  const bx = wrapX(bSeg.x), by = wrapY(bSeg.y);

  // Zone: >15 cyan (+3 bonus), 8–15 yellow, <8 red (death)
  const zoneColor = n > 15 ? '#00e5ff' : n >= 8 ? '#f5e642' : '#ff2d78';

  if (n < 8) {
    // Death zone — flash red, lose life, no segment detach
    triggerSnapEffect(bx, by, '#ff2d78', []);
    camShakeFrames = 10;
    sfx.snap();
    handleDeath();
    if (hitRobin) robinNewHop(hitRobin);
    return;
  }

  // Detach tail from segIndex onward
  const detached = wSegs.splice(keepTo);

  // Spawn poison pixels unless suppressed (chain-reaction prevention)
  if (!noNewPoison) {
    for (const seg of detached) {
      poisonPixels.push({
        x: wrapX(seg.x), y: wrapY(seg.y),
        vx: (Math.random() - 0.5) * rand(0.8, 1.6),
        vy: (Math.random() - 0.5) * rand(0.8, 1.6),
        age: 0,
        pulse: Math.random() * Math.PI * 2,
      });
    }
    // Discard oldest if over cap (no forced explosion to avoid cascades)
    while (poisonPixels.length > POISON_CAP) poisonPixels.shift();
  }

  triggerSnapEffect(bx, by, zoneColor, detached);
  camShakeFrames = 10;
  wInvincible    = 85;
  sfx.snap();

  if (n > 15) { score += 3; updateHUD(); }
  if (hitRobin) robinNewHop(hitRobin);
}

/* ── update snap effects ── */
function updateSnapEffects() {
  for (let i = snapEffects.length - 1; i >= 0; i--) {
    const e = snapEffects[i];
    e.t++;
    for (const sp of e.sparks) {
      sp.x += sp.vx; sp.y += sp.vy;
      sp.vx *= 0.87; sp.vy *= 0.87;
      sp.life--;
    }
    e.sparks = e.sparks.filter(sp => sp.life > 0);
    for (const ts of e.tailSegs) ts.alpha = Math.max(0, ts.alpha - 0.052);
    if (e.t > 35 && e.sparks.length === 0) snapEffects.splice(i, 1);
  }
}

/* ── draw snap effects ── */
function drawSnapEffects() {
  if (!gameStarted) return;
  for (const e of snapEffects) {
    // Electric arcs (first 8 frames)
    if (e.t < 8) {
      const arcAlpha = (1 - e.t / 8) * 0.92;
      ctx.save();
      ctx.globalAlpha = arcAlpha;
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur  = 9;
      ctx.lineWidth   = 1.8;
      ctx.lineCap     = 'round';
      for (const arc of e.arcs) {
        ctx.beginPath();
        ctx.moveTo(arc.pts[0].x, arc.pts[0].y);
        for (let pi = 1; pi < arc.pts.length; pi++) ctx.lineTo(arc.pts[pi].x, arc.pts[pi].y);
        ctx.stroke();
      }
      ctx.restore();
    }
    // Dissolving tail segments (white flash → zone color → fade)
    for (const ts of e.tailSegs) {
      if (ts.alpha <= 0) continue;
      const col = e.t < 6 ? '#ffffff' : e.zoneColor;
      ctx.save();
      ctx.globalAlpha = ts.alpha;
      ctx.fillStyle   = col;
      ctx.shadowColor = e.zoneColor;
      ctx.shadowBlur  = 10;
      ctx.beginPath();
      ctx.arc(ts.x, ts.y, SEG_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Expanding zone-color ring at break point
    if (e.t < 22) {
      ctx.save();
      ctx.globalAlpha = (1 - e.t / 22) * 0.88;
      ctx.strokeStyle = e.zoneColor;
      ctx.shadowColor = e.zoneColor;
      ctx.shadowBlur  = 14;
      ctx.lineWidth   = 2.5;
      ctx.beginPath();
      ctx.arc(e.x, e.y, SEG_RADIUS + e.t * 2.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    // Sparks
    for (const sp of e.sparks) {
      ctx.save();
      ctx.globalAlpha = sp.life / 24;
      ctx.fillStyle   = sp.col.css;
      ctx.shadowColor = sp.col.css;
      ctx.shadowBlur  = 7;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Floating +3 for cyan zone
    if (e.zoneColor === '#00e5ff' && e.t < 32) {
      ctx.save();
      ctx.globalAlpha = e.t < 22 ? 1 : 1 - (e.t - 22) / 10;
      ctx.fillStyle   = '#00e5ff';
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur  = 9;
      ctx.font        = '700 12px "Space Mono",monospace';
      ctx.textAlign   = 'center';
      ctx.fillText('+3', e.x, e.y - 22 - e.t * 0.55);
      ctx.restore();
    }
  }
}

/* ── explode a single poison pixel ── */
function _explodePoison(pp) {
  const ex = wrapX(pp.x), ey = wrapY(pp.y);
  camShakeFrames = Math.max(camShakeFrames, 8);
  sfx.poisonExplode();

  const particles = [];
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + rand(-0.3, 0.3);
    const spd   = rand(3, 7);
    particles.push({
      x: ex, y: ey,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 30, col: i % 2 === 0 ? '#ff2200' : '#f5e642',
    });
  }
  poisonExplosions.push({ x: ex, y: ey, t: 0, particles });

  // Proximity damage: find closest worm segment within POISON_EXPLODE_R
  if (deathState === null && wInvincible === 0 && wSegs.length > 1) {
    let nearSi = -1, nearDist = POISON_EXPLODE_R;
    for (let si = 0; si < wSegs.length; si++) {
      const d = torusDist(ex, ey, wrapX(wSegs[si].x), wrapY(wSegs[si].y));
      if (d < nearDist) { nearDist = d; nearSi = si; }
    }
    if (nearSi >= 0) {
      wormSnapAt(nearSi, null, true);   // noNewPoison=true → no chain reaction
      wInvincible = Math.max(wInvincible, 100);
      showToast('EXPLOSION!', 1800, '#ff6600');
    }
  }
}

/* ── update poison pixels ── */
function updatePoisonPixels() {
  if (!gameStarted || levelPaused) return;
  for (let i = poisonPixels.length - 1; i >= 0; i--) {
    const pp = poisonPixels[i];
    pp.x    += pp.vx;
    pp.y    += pp.vy;
    pp.pulse += 0.06;
    pp.age++;
    if (pp.age >= POISON_PHASE2) {
      _explodePoison(pp);
      poisonPixels.splice(i, 1);
    }
  }
  // Phase 2 ONLY: player head collision (phase 1 is safe)
  if (wInvincible === 0 && wSegs.length > 0 && !cnstPoisonSafe) {
    const hx = wrapX(wSegs[0].x), hy = wrapY(wSegs[0].y);
    for (let i = poisonPixels.length - 1; i >= 0; i--) {
      const pp = poisonPixels[i];
      if (pp.age < POISON_PHASE1) continue;  // phase 1: harmless
      if (torusDist(hx, hy, wrapX(pp.x), wrapY(pp.y)) < SEG_RADIUS + POISON_HIT_R) {
        poisonPixels.splice(i, 1);
        const remove = Math.min(4, wSegs.length - 1);
        if (remove > 0) wSegs.splice(wSegs.length - remove, remove);
        wInvincible = 60;
        if (wSegs.length > 0) {
          const tail = wSegs[wSegs.length - 1];
          triggerSnapEffect(wrapX(tail.x), wrapY(tail.y), '#aaff00', []);
        }
        showToast('POISONED!', 1800, '#aaff00');
        sfx.damage();
        break;
      }
    }
  }
}

/* ── update poison explosions ── */
function updatePoisonExplosions() {
  for (let i = poisonExplosions.length - 1; i >= 0; i--) {
    const e = poisonExplosions[i];
    e.t++;
    for (let pi = e.particles.length - 1; pi >= 0; pi--) {
      const p = e.particles[pi];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.90; p.vy *= 0.90;
      p.life--;
      if (p.life <= 0) e.particles.splice(pi, 1);
    }
    if (e.t > 35 && e.particles.length === 0) poisonExplosions.splice(i, 1);
  }
}

/* ── draw poison pixels ── */
function drawPoisonPixels() {
  if (!gameStarted || poisonPixels.length === 0) return;
  for (const pp of poisonPixels) {
    const phase2 = pp.age >= POISON_PHASE1;
    const px = wrapX(pp.x), py = wrapY(pp.y);

    // Phase 2 near-explosion blink (last 30 frames)
    const nearExp = phase2 && pp.age > POISON_PHASE2 - 30;
    if (nearExp && Math.floor(pp.age / 4) % 2 === 1) continue; // blink off

    let sc, r;
    if (phase2) {
      // Fast pulse: period 18 frames, scale 0.85–1.15
      sc = 0.85 + 0.30 * (0.5 + 0.5 * Math.sin(pp.age * (Math.PI * 2 / 18)));
    } else {
      // Gentle pulse
      sc = 0.90 + 0.10 * Math.sin(pp.pulse);
    }
    r = POISON_HIT_R * sc;

    ctx.save();
    if (phase2) {
      // DANGER: red body, yellow outline
      ctx.fillStyle   = '#ff2200';
      ctx.shadowColor = '#ff2200';
      ctx.shadowBlur  = 20;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(245,230,66,0.85)';
      ctx.lineWidth   = 2;
      ctx.shadowBlur  = 0;
      ctx.stroke();
      ctx.fillStyle   = '#f5e642';
      ctx.shadowColor = '#f5e642';
      ctx.shadowBlur  = 6;
      ctx.font        = '700 7px "Space Mono",monospace';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('☠', px, py - r - 2);
    } else {
      // WARNING: yellow body, red outline
      ctx.fillStyle   = '#f5e642';
      ctx.shadowColor = '#f5e642';
      ctx.shadowBlur  = 12;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,0,0,0.7)';
      ctx.lineWidth   = 2;
      ctx.shadowBlur  = 0;
      ctx.stroke();
      ctx.fillStyle   = '#ff0000';
      ctx.font        = '700 7px "Space Mono",monospace';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('✕', px, py - r - 2);
    }
    ctx.restore();
  }
}

/* ── draw poison explosions ── */
function drawPoisonExplosions() {
  for (const e of poisonExplosions) {
    // White flash ring (first 8 frames)
    if (e.t < 8) {
      const fr = (e.t / 8) * 40;
      const fa = (1 - e.t / 8) * 0.6;
      ctx.save();
      ctx.globalAlpha = fa;
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur  = 20;
      ctx.lineWidth   = 3;
      ctx.beginPath(); ctx.arc(e.x, e.y, fr, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    // Particles
    for (const p of e.particles) {
      ctx.save();
      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle   = p.col;
      ctx.shadowColor = p.col;
      ctx.shadowBlur  = 10;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }
}

// ─── ALIEN SHIPS ─────────────────────────────────────────────────────────────
const SHIP_HULL_W    = 58;
const SHIP_HULL_H    = 22;
const SHIP_DOME_R    = 15;    // dome bubble radius (taller than hull half-height)
const SHIP_TELEGRAPH = 90;
const SHIP_CLAW_SPD  = 3.5;
const SHIP_CLAW_R    = 10;
const SHIP_IDLE_MIN  = 160;
const SHIP_IDLE_MAX  = 340;

let alienShips = [];

function makeShip(binSide) {
  return {
    x: rand(SHIP_HULL_W, W - SHIP_HULL_W),
    y: 85 + rand(0, 35),
    vx: (binSide === 0 ? 1 : -1) * rand(0.5, 1.2),
    phase: 'idle',
    phaseT: 0,
    idleDur: Math.floor(rand(SHIP_IDLE_MIN, SHIP_IDLE_MAX)),
    clawExt: 0,
    clawPhase: Math.random() * Math.PI * 2,
    grabbed: false,
    binSide,                // 0 = left bin, 1 = right bin
    homeX: rand(SHIP_HULL_W, W - SHIP_HULL_W),
    targetX: W / 2,
    targetY: H / 2,
    eyeT: Math.random() * Math.PI * 2,
  };
}

function shipBinX(s) { return s.binSide === 0 ? 46 : W - 46; }

function initShips() {
  alienShips = [];
  for (let i = 0; i < 2; i++) {
    const s = makeShip(i);
    s.phaseT = Math.floor(rand(0, s.idleDur * (i === 0 ? 0.35 : 0.65)));
    alienShips.push(s);
  }
}

/* Returns 0 (closed) → 1 (fully open) based on phase and clawPhase oscillation */
function clawOpenAmt(s) {
  if (s.grabbed) return 0;
  if (s.phase === 'drop' || (s.phase === 'retract' && !s.grabbed))
    return 0.5 + 0.5 * Math.sin(s.clawPhase);
  return 0.85;
}

function updateShips() {
  if (!gameStarted || levelPaused) return;
  for (const s of alienShips) {
    s.phaseT++;
    s.eyeT += 0.028;

    if (s.phase === 'idle') {
      s.x += s.vx;
      if (s.x < SHIP_HULL_W / 2)     { s.x = SHIP_HULL_W / 2;     s.vx *= -1; }
      if (s.x > W - SHIP_HULL_W / 2) { s.x = W - SHIP_HULL_W / 2; s.vx *= -1; }
      if (s.phaseT >= s.idleDur && wSegs.length > 1) {
        const si = Math.floor(rand(1, Math.min(10, wSegs.length - 1)));
        s.targetX = wrapX(wSegs[si].x);
        s.targetY = wrapY(wSegs[si].y);
        s.homeX   = s.x;
        s.phase   = 'telegraph';
        s.phaseT  = 0;
        s.grabbed = false;
      }
    } else if (s.phase === 'telegraph') {
      const dx = s.targetX - s.x;
      s.x += Math.sign(dx) * Math.min(Math.abs(dx), 0.8);
      if (s.phaseT >= SHIP_TELEGRAPH) {
        s.phase     = 'drop';
        s.phaseT    = 0;
        s.clawExt   = 0;
        s.clawPhase = 0;
      }
    } else if (s.phase === 'drop') {
      s.clawPhase += 0.13;   // open/close oscillation
      s.clawExt   += SHIP_CLAW_SPD;
      const maxExt = H - s.y - SHIP_HULL_H / 2 - 10;
      if (s.clawExt > maxExt) s.clawExt = maxExt;

      // Only grab when claw is open enough
      if (!s.grabbed && clawOpenAmt(s) > 0.55 && wSegs.length > 1) {
        const tipY = s.y + SHIP_HULL_H / 2 + s.clawExt;
        for (let si = 1; si < wSegs.length; si++) {
          const wx = wrapX(wSegs[si].x), wy = wrapY(wSegs[si].y);
          if (torusDist(s.x, tipY, wx, wy) < SEG_RADIUS + SHIP_CLAW_R) {
            wormSnapAt(si, null);
            sfx.clawGrab();
            s.grabbed   = true;
            s.clawPhase = 0;   // snap shut
            s.phase     = 'retract';
            s.phaseT    = 0;
            break;
          }
        }
      }
      if (!s.grabbed && (s.clawExt >= maxExt - 1 || s.phaseT > 130)) {
        s.phase  = 'retract';
        s.phaseT = 0;
      }
    } else if (s.phase === 'retract') {
      if (!s.grabbed) s.clawPhase += 0.13;
      s.clawExt -= SHIP_CLAW_SPD * 1.5;
      if (s.clawExt <= 0) {
        s.clawExt = 0;
        if (s.grabbed) {
          s.phase  = 'to_bin';
          s.phaseT = 0;
        } else {
          s.phase   = 'idle';
          s.phaseT  = 0;
          s.idleDur = Math.floor(rand(SHIP_IDLE_MIN, SHIP_IDLE_MAX));
        }
      }
    } else if (s.phase === 'to_bin') {
      const bx = shipBinX(s);
      const dx = bx - s.x;
      s.x += Math.sign(dx) * Math.min(Math.abs(dx), 2.0);
      if (Math.abs(dx) < 2.5) {
        s.x      = bx;
        s.phase  = 'drop_bin';
        s.phaseT = 0;
        s.clawExt = 0;
      }
    } else if (s.phase === 'drop_bin') {
      if (s.phaseT < 18) {
        s.clawExt = Math.min(s.clawExt + 3, 28);
      } else {
        s.clawExt -= 4.5;
        if (s.clawExt <= 0) {
          s.clawExt = 0;
          s.grabbed = false;
          s.phase   = 'return_home';
          s.phaseT  = 0;
        }
      }
    } else if (s.phase === 'return_home') {
      const dx = s.homeX - s.x;
      s.x += Math.sign(dx) * Math.min(Math.abs(dx), 1.6);
      if (Math.abs(dx) < 2.0) {
        s.x       = s.homeX;
        s.vx      = (Math.random() < 0.5 ? 1 : -1) * rand(0.5, 1.2);
        s.phase   = 'idle';
        s.phaseT  = 0;
        s.idleDur = Math.floor(rand(SHIP_IDLE_MIN, SHIP_IDLE_MAX));
      }
    }
  }
}

/* Draw the arcade-style opening/closing claw at (cx, tipY) */
function drawClaw(cx, tipY, openAmt, grabbed) {
  const armLen = 13;
  const maxSpread = 0.75;   // radians when fully open
  const spread = openAmt * maxSpread;

  ctx.lineCap     = 'round';
  ctx.lineWidth   = 3;
  ctx.strokeStyle = grabbed ? '#ffdd44' : '#33cc77';
  ctx.shadowColor = grabbed ? '#ffaa00' : '#00ff88';
  ctx.shadowBlur  = grabbed ? 12 : 7;

  // Left arm
  const lx = cx - Math.sin(spread) * armLen;
  const ly = tipY + Math.cos(spread) * armLen;
  ctx.beginPath(); ctx.moveTo(cx, tipY); ctx.lineTo(lx, ly); ctx.stroke();
  // Right arm
  const rx = cx + Math.sin(spread) * armLen;
  const ry = tipY + Math.cos(spread) * armLen;
  ctx.beginPath(); ctx.moveTo(cx, tipY); ctx.lineTo(rx, ry); ctx.stroke();

  // Inward-curling prong tips (arcade claw curl)
  ctx.lineWidth = 2;
  const curlAng = spread * 0.55;
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx + Math.sin(curlAng) * 7, ly + Math.cos(curlAng) * 7);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.lineTo(rx - Math.sin(curlAng) * 7, ry + Math.cos(curlAng) * 7);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function drawShips() {
  if (!gameStarted) return;

  // Draw collection bins (one per ship, at left/right edge at ship's y level)
  for (const s of alienShips) {
    const bx = shipBinX(s), by = s.y;
    const bw = 34, bh = 22;
    ctx.save();
    ctx.fillStyle   = '#0d3322';
    ctx.strokeStyle = '#00cc66';
    ctx.lineWidth   = 1.5;
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur  = 5;
    // Trapezoidal bin body (wider at top, narrower at bottom)
    ctx.beginPath();
    ctx.moveTo(bx - bw / 2,       by - bh / 2);
    ctx.lineTo(bx + bw / 2,       by - bh / 2);
    ctx.lineTo(bx + bw / 2 - 4,   by + bh / 2);
    ctx.lineTo(bx - bw / 2 + 4,   by + bh / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Bin rim (top edge highlight)
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth   = 2.5;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.moveTo(bx - bw / 2, by - bh / 2);
    ctx.lineTo(bx + bw / 2, by - bh / 2);
    ctx.stroke();
    ctx.restore();
  }

  for (const s of alienShips) {
    const hw = SHIP_HULL_W / 2, hh = SHIP_HULL_H / 2;
    ctx.save();

    // Telegraph: pulsing cyan dotted line + belly pulse ring
    if (s.phase === 'telegraph') {
      ctx.save();
      ctx.globalAlpha = 0.35 + 0.35 * Math.sin(s.phaseT * 0.25);
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(s.x, s.y + hh);
      ctx.lineTo(s.targetX, s.targetY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth   = 1.5;
      const pulse = 3 + 3 * Math.sin(s.phaseT * 0.35);
      ctx.beginPath(); ctx.arc(s.x, s.y + hh, pulse, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    // Cable + claw (drop, retract, to_bin, drop_bin)
    const showCable = s.clawExt > 0 &&
      (s.phase === 'drop' || s.phase === 'retract' ||
       s.phase === 'to_bin' || s.phase === 'drop_bin');
    if (showCable) {
      const tipY = s.y + hh + s.clawExt;
      ctx.strokeStyle = '#88ffaa';
      ctx.lineWidth   = 2;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur  = 4;
      ctx.beginPath(); ctx.moveTo(s.x, s.y + hh); ctx.lineTo(s.x, tipY); ctx.stroke();
      ctx.shadowBlur  = 0;

      drawClaw(s.x, tipY, clawOpenAmt(s), s.grabbed);

      // Grabbed worm chunk dangling at claw tip
      if (s.grabbed) {
        ctx.fillStyle   = '#ff6633';
        ctx.shadowColor = '#ff4411';
        ctx.shadowBlur  = 9;
        ctx.beginPath();
        ctx.arc(s.x, tipY + 6, SEG_RADIUS * 0.75, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // ── Hull ──
    ctx.fillStyle   = '#22aa66';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur  = 12;
    roundRectPath(s.x - hw, s.y - hh, SHIP_HULL_W, SHIP_HULL_H, 6);
    ctx.fill();
    // Belly detail stripe
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth   = 1;
    ctx.shadowBlur  = 4;
    ctx.beginPath();
    ctx.moveTo(s.x - hw + 8, s.y + hh - 5);
    ctx.lineTo(s.x + hw - 8, s.y + hh - 5);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // ── Dome + alien head ──
    const domeCY = s.y - hh - SHIP_DOME_R * 0.6;   // bubble center above hull

    // Alien head (drawn before dome glass so it appears inside)
    const headR = SHIP_DOME_R * 0.60;
    ctx.fillStyle   = '#44dd44';
    ctx.shadowColor = '#00bb00';
    ctx.shadowBlur  = 5;
    ctx.beginPath();
    ctx.arc(s.x, domeCY + headR * 0.12, headR, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Big dark alien eyes with blink
    const blinking = Math.sin(s.eyeT * 3.2) > 0.90;
    const eyeRx = headR * 0.27, eyeRy = blinking ? 1.2 : headR * 0.33;
    const eox = headR * 0.37, eoy = headR * 0.04;
    ctx.fillStyle = '#0a0a1a';
    ctx.beginPath(); ctx.ellipse(s.x - eox, domeCY + eoy, eyeRx, eyeRy, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s.x + eox, domeCY + eoy, eyeRx, eyeRy, 0, 0, Math.PI * 2); ctx.fill();
    // Shine dots
    if (!blinking) {
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.beginPath(); ctx.arc(s.x - eox + eyeRx * 0.38, domeCY + eoy - eyeRy * 0.32, eyeRx * 0.29, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s.x + eox + eyeRx * 0.38, domeCY + eoy - eyeRy * 0.32, eyeRx * 0.29, 0, Math.PI * 2); ctx.fill();
    }

    // Dome glass bubble (on top of alien head)
    ctx.beginPath();
    ctx.arc(s.x, domeCY, SHIP_DOME_R, 0, Math.PI * 2);
    ctx.fillStyle   = 'rgba(180,255,180,0.15)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,120,0.55)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    // Glass highlight arc
    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.arc(s.x - SHIP_DOME_R * 0.22, domeCY - SHIP_DOME_R * 0.28, SHIP_DOME_R * 0.44, Math.PI * 1.1, Math.PI * 1.72);
    ctx.stroke();

    // ── Running lights ──
    const lb = Math.sin(s.phaseT * 0.12 + s.x * 0.01) > 0;
    ctx.fillStyle   = lb ? '#ff4444' : '#661111';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur  = lb ? 6 : 0;
    ctx.beginPath(); ctx.arc(s.x - hw + 8, s.y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle   = lb ? '#44ff44' : '#116611';
    ctx.shadowColor = '#44ff44';
    ctx.beginPath(); ctx.arc(s.x + hw - 8, s.y, 3, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }
}

// ─── LEVEL SYSTEM ────────────────────────────────────────────────────────────
const LEVEL_DEFS = [
  { n: 1, name: 'DEEP SPACE',   threshold: 500      },
  { n: 2, name: 'THE BELT',     threshold: 1500     },
  { n: 3, name: 'CONSTELLATION CORRIDOR', threshold: 3500     },
  { n: 4, name: 'NEON CITY',    threshold: 7000     },
  { n: 5, name: 'THE VOID',     threshold: Infinity },
];

let currentLevel = 1;
let levelPaused  = false;

// ─── LEVEL BACKGROUNDS ───────────────────────────────────────────────────────
let bgPlanets   = [];
let bgNebulae   = [];
let bgBuildings = [];
let bgGrid      = { angle: 0 };

function initLevelBackground(n) {
  bgPlanets = []; bgNebulae = []; bgBuildings = [];
  bgGrid.angle = 0;

  if (n === 2) {
    const count = Math.floor(rand(3, 6));
    for (let i = 0; i < count; i++) {
      const r   = rand(40, 110);
      const hue = rand(160, 340);
      bgPlanets.push({
        x: rand(r + 50, W - r - 50),
        y: rand(r + 50, H - r - 50),
        r, c1: `hsl(${hue},22%,20%)`, c2: `hsl(${hue},16%,8%)`,
        hasRing: i === 0, ringTilt: rand(0.18, 0.42),
      });
    }
  }

  if (n === 3) {
    for (let i = 0; i < Math.floor(rand(7, 12)); i++) {
      bgNebulae.push({
        x: rand(0, W), y: rand(0, H),
        rx: rand(90, 240), ry: rand(60, 170),
        color: pick(['rgba(153,0,255,','rgba(0,102,255,','rgba(255,45,120,','rgba(0,229,255,']),
        alpha: rand(0.035, 0.085),
      });
    }
  }

  if (n === 4) {
    const floorY = Math.floor(H * 0.75);
    let x = -10;
    while (x < W + 60) {
      const bw = rand(38, 105), bh = rand(55, H * 0.22);
      bgBuildings.push({ x, floorY, bw, bh,
        wins: makeWindowGrid(x, floorY - bh, bw, bh) });
      x += bw + rand(2, 12);
    }
  }
}

function makeWindowGrid(bx, by, bw, bh) {
  const wins = [];
  const cols = Math.floor(bw / 13), rows = Math.floor(bh / 15);
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (Math.random() < 0.55)
        wins.push({ x: bx + 4 + c * 13, y: by + 5 + r * 15,
          color: Math.random() < 0.55 ? '#00e5ff' : '#ff2d78' });
  return wins;
}

function drawBackground() {
  const n = currentLevel;
  if (n === 5) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawGlowWorms();
  } else if (n === 4) {
    ctx.fillStyle = '#050610';
    ctx.fillRect(0, 0, W, H);
    drawStars();
    drawGlowWorms();
    drawSkyline();
  } else {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    if (n === 3) {
      drawScrollingStars();
      drawNebulae();
    } else {
      drawStars();
    }
    drawGlowWorms();
    if (n === 2) drawPlanets();
  }
}

function drawPlanets() {
  for (const p of bgPlanets) {
    ctx.save();
    const g = ctx.createRadialGradient(
      p.x - p.r * 0.28, p.y - p.r * 0.28, p.r * 0.05, p.x, p.y, p.r);
    g.addColorStop(0, p.c1); g.addColorStop(1, p.c2);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    if (p.hasRing) {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.scale(1, p.ringTilt);
      ctx.beginPath(); ctx.arc(0, 0, p.r * 1.65, 0, Math.PI * 2);
      ctx.strokeStyle = p.c1; ctx.lineWidth = p.r * 0.16;
      ctx.globalAlpha = 0.38; ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }
}

function drawNebulae() {
  for (const nb of bgNebulae) {
    ctx.save();
    ctx.globalAlpha = nb.alpha;
    const g = ctx.createRadialGradient(nb.x, nb.y, 0, nb.x, nb.y, Math.max(nb.rx, nb.ry));
    g.addColorStop(0, nb.color + '0.9)');
    g.addColorStop(0.5, nb.color + '0.4)');
    g.addColorStop(1, nb.color + '0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(nb.x, nb.y, nb.rx, nb.ry, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.restore();
  }
}

function drawSkyline() {
  const floorY = Math.floor(H * 0.75);
  ctx.fillStyle = '#090a14';
  for (const b of bgBuildings)
    ctx.fillRect(b.x, b.floorY - b.bh, b.bw, b.bh + 4);
  ctx.fillStyle = '#0a0b16';
  ctx.fillRect(0, floorY, W, H - floorY);
  for (const b of bgBuildings) {
    for (const w of b.wins) {
      ctx.save();
      ctx.fillStyle = w.color; ctx.shadowColor = w.color;
      ctx.shadowBlur = 5; ctx.globalAlpha = 0.6;
      ctx.fillRect(w.x, w.y, 5, 5);
      ctx.restore();
    }
  }
}

function drawGrid() {
  bgGrid.angle += 0.0015;
  ctx.save();
  ctx.translate(W / 2, H / 2); ctx.rotate(bgGrid.angle);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  const span = Math.max(W, H) * 1.5, step = 58;
  for (let v = -span; v <= span; v += step) {
    ctx.beginPath(); ctx.moveTo(v, -span); ctx.lineTo(v, span); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-span, v); ctx.lineTo(span, v); ctx.stroke();
  }
  ctx.restore();
}
